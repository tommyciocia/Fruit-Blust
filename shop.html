<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-title" content="FruitBlast">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🛒 Negozio — FruitBlast</title>
<link rel="stylesheet" href="style.css">
<style>
.shop-page{ gap:10px; }

.credits-bar{
  width:100%;
  background:linear-gradient(135deg,rgba(138,43,226,.22),rgba(75,0,130,.15));
  border:1px solid rgba(180,100,255,.32);
  border-radius:14px; padding:10px 14px;
  display:flex; align-items:center; gap:12px;
  position:relative; overflow:hidden;
}
.credits-bar::before{
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent,rgba(180,100,255,.07),transparent);
  animation:cShimmer 4s infinite;
}
@keyframes cShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.cb-gem{ font-size:24px; filter:drop-shadow(0 0 8px rgba(200,100,255,.7)); flex-shrink:0; }
.cb-info{ flex:1; }
.cb-label{ font-size:10px; color:rgba(200,150,255,.7); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:2px; }
.cb-val{ font-family:'Fredoka One',cursive; font-size:clamp(20px,6vw,26px); color:#d4a8ff; line-height:1; }
.cb-sub{ font-size:10px; color:rgba(200,150,255,.45); margin-top:2px; }

/* Tabs */
.shop-tabs{
  display:flex; gap:5px; width:100%;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  scrollbar-width:none; padding-bottom:2px;
}
.shop-tabs::-webkit-scrollbar{ display:none; }
.shop-tab{
  flex-shrink:0; padding:9px 12px; border-radius:12px; cursor:pointer;
  text-align:center; font-size:12px; font-weight:700; white-space:nowrap;
  font-family:'Nunito',sans-serif;
  background:var(--glass); border:1px solid var(--gb);
  color:rgba(255,255,255,.55); transition:all .18s;
}
.shop-tab.active{ background:rgba(255,215,0,.14); border-color:var(--gold); color:var(--gold); }

/* Section panels */
.shop-panel{ display:none; flex-direction:column; gap:9px; width:100%; }
.shop-panel.visible{ display:flex; }

/* Cards */
.item-card{
  width:100%; border-radius:16px; padding:12px 14px;
  background:var(--glass); border:2px solid var(--gb);
  position:relative; overflow:hidden;
  transition:border-color .2s, box-shadow .2s;
}
.item-card.owned-card{ border-color:rgba(46,204,113,.25); }
.item-card.active-card{
  border-color:var(--gold);
  box-shadow:0 4px 18px rgba(255,215,0,.2);
}
.item-card.active-card::before{
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg,var(--gold),#ff9f43);
}

.ic-head{ display:flex; align-items:center; gap:10px; margin-bottom:9px; }
.ic-main-icon{ font-size:28px; line-height:1; flex-shrink:0; }
.ic-info{ flex:1; min-width:0; }
.ic-name{ font-family:'Fredoka One',cursive; font-size:17px; color:#fff; margin-bottom:1px; }
.ic-desc{ font-size:11px; color:rgba(255,255,255,.5); line-height:1.3; }

/* Emoji preview */
.ic-emojis{
  display:flex; gap:5px; flex-wrap:wrap;
  background:rgba(255,255,255,.04); border-radius:10px;
  padding:7px 9px; margin-bottom:10px;
}
.ic-emojis span{ font-size:20px; line-height:1; }

/* Color preview */
.ic-colors{
  display:flex; gap:7px; flex-wrap:wrap;
  background:rgba(255,255,255,.04); border-radius:10px;
  padding:8px 10px; margin-bottom:10px; align-items:center;
}
.color-dot{
  width:30px; height:30px; border-radius:8px;
  border:2px solid rgba(255,255,255,.25);
  flex-shrink:0;
}
.color-range-label{
  font-size:11px; color:rgba(255,255,255,.5); font-style:italic;
  margin-left:2px; line-height:1.3;
}

/* Footer */
.ic-footer{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
.ic-price{ font-family:'Fredoka One',cursive; font-size:15px; color:#d4a8ff; }
.ic-price.free{ color:var(--green); }
.ic-price.spent{ color:rgba(255,255,255,.25); }

.ic-badge{
  position:absolute; top:9px; right:9px;
  font-size:10px; font-weight:900;
  border-radius:7px; padding:2px 7px; letter-spacing:.5px;
}
.ic-badge.owned{ background:rgba(46,204,113,.18); color:#2ecc71; border:1px solid rgba(46,204,113,.3); }
.ic-badge.active{ background:rgba(255,215,0,.15); color:var(--gold); border:1px solid rgba(255,215,0,.3); }

/* Buttons */
.btn-buy{
  background:linear-gradient(135deg,#9b59b6,#6c3483);
  color:#fff; border:none; border-radius:10px;
  padding:8px 16px; font-size:13px; font-weight:900;
  font-family:'Nunito',sans-serif; cursor:pointer;
  box-shadow:0 3px 10px rgba(155,89,182,.35);
  transition:transform .15s; white-space:nowrap;
}
.btn-buy:active{ transform:scale(.95); }
.btn-buy:disabled{ opacity:.35; cursor:default; background:rgba(255,255,255,.1); box-shadow:none; }
.btn-equip{
  background:linear-gradient(135deg,#27ae60,#1e8449);
  color:#fff; border:none; border-radius:10px;
  padding:8px 16px; font-size:13px; font-weight:900;
  font-family:'Nunito',sans-serif; cursor:pointer;
  box-shadow:0 3px 10px rgba(39,174,96,.3);
  transition:transform .15s;
}
.btn-equip:active{ transform:scale(.95); }
.btn-active{
  background:rgba(255,215,0,.12); color:var(--gold);
  border:1px solid rgba(255,215,0,.3); border-radius:10px;
  padding:8px 16px; font-size:13px; font-weight:900;
  font-family:'Nunito',sans-serif; white-space:nowrap;
}
.pu-owned-badge{
  font-family:'Fredoka One',cursive; font-size:22px; color:#fff;
  display:flex; flex-direction:column; align-items:center;
  min-width:36px; text-align:center; line-height:1;
}
.btn-buy-pu{
  background:linear-gradient(135deg,#9b59b6,#6c3483);
  color:#fff; border:none; border-radius:10px;
  padding:8px 14px; font-size:14px; font-weight:900;
  font-family:'Nunito',sans-serif; cursor:pointer;
  box-shadow:0 3px 10px rgba(155,89,182,.35);
  transition:transform .15s; white-space:nowrap;
}
.btn-buy-pu:active{ transform:scale(.93); }
.btn-buy-pu:disabled{ opacity:.32; cursor:default; background:rgba(255,255,255,.1); box-shadow:none; }
.btn-buy-5{
  background:linear-gradient(135deg,#8e44ad,#512e5f);
  font-size:13px;
}

/* Toast */
#shop-toast{
  position:fixed;
  bottom:calc(env(safe-area-inset-bottom,0px) + 24px);
  left:50%; transform:translateX(-50%) translateY(16px);
  background:rgba(20,8,46,.97); border:1px solid rgba(255,255,255,.18);
  color:#fff; font-size:14px; font-weight:700;
  border-radius:50px; padding:10px 24px;
  opacity:0; transition:opacity .22s, transform .22s;
  z-index:999; white-space:nowrap; pointer-events:none;
  font-family:'Nunito',sans-serif;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
#shop-toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(reg => {
    reg.update();
    reg.addEventListener('updatefound', () => {
      const sw = reg.installing;
      sw.addEventListener('statechange', () => {
        if(sw.state === 'installed' && navigator.serviceWorker.controller) window.location.reload();
      });
    });
  });
  navigator.serviceWorker.addEventListener('message', e => {
    if(e.data && e.data.type === 'SW_UPDATED') window.location.reload();
  });
}
</script>
</head>

<div class="page shop-page fade-in sub-page">

    <div class="cb-info">
      <div class="cb-label">I tuoi Punti Bonus</div>

    </div>
  </div>

  <div class="shop-panel" id="panel-multi"></div>

  <div class="shop-panel" id="panel-emoji"></div>
  <div class="shop-panel" id="panel-colori"></div>

</div>
</div>

<div id="shop-toast"></div>

<script src="data.js"></script>

  { id:'viola',   icon:'🟣', name:'Viola elettrico',   desc:'Blocchi viola vivido — misteriosi e potenti',
    colors:['#6c3483','#9b59b6','#c39bd3'],                    price:1800 },
  { id:'arancio', icon:'🟠', name:'Arancio vulcano',   desc:'Blocchi arancio incandescente',
    colors:['#ba4a00','#e67e22','#f0a500'],                    price:2200 },
  { id:'nero',    icon:'⬛', name:'Nero assoluto',     desc:'Blocchi neri eleganti — per i veri duri',
    colors:['#1c1c1c','#2c2c2c','#3d3d3d'],                    price:2600 },
  { id:'rosa',    icon:'🩷', name:'Rosa neon',         desc:'Blocchi rosa fluo — colorati e vibranti',
    colors:['#c0185a','#e91e8c','#ff6ec7'],                    price:3000 },
  { id:'ciano',   icon:'🩵', name:'Ciano ghiaccio',    desc:'Blocchi ciano brillante come cristalli di ghiaccio',
    colors:['#117a8b','#17a2b8','#6dd5ed'],                    price:4000 },
  { id:'arcobaleno', icon:'🌈', name:'Arcobaleno',     desc:'Ogni blocco ha un colore diverso — il massimo!',
    colors:['#e74c3c','#f1c40f','#2ecc71','#3498db','#9b59b6'],price:3500 },

// ── Sfondi griglia ──
const GRID_THEMES = [
  { id:'default',  icon:'⬛', name:'Classico',         desc:'Griglia scura senza sfondo — il default',
    bg:'rgba(255,255,255,.04)', cellEmpty:'rgba(255,255,255,.05)', border:'rgba(255,255,255,.1)', price:0 },
  { id:'notte',    icon:'🌌', name:'Notte stellata',   desc:'Sfondo blu notte con griglia stellata',
    bg:'rgba(10,20,60,.7)',    cellEmpty:'rgba(30,50,120,.18)',    border:'rgba(80,120,255,.2)', price:1500 },
  { id:'foresta',  icon:'🌿', name:'Foresta',          desc:'Verde profondo come una foresta tropicale',
    bg:'rgba(10,40,20,.7)',    cellEmpty:'rgba(30,100,50,.18)',    border:'rgba(50,180,80,.2)', price:1800 },
  { id:'lava',     icon:'🌋', name:'Lava',             desc:'Rosso fuoco — la griglia incandescente',

  { id:'oceano',   icon:'🌊', name:'Oceano profondo',  desc:'Azzurro abissale come il fondo del mare',
    bg:'rgba(5,30,60,.75)',    cellEmpty:'rgba(10,80,140,.18)',    border:'rgba(30,140,220,.22)', price:2200 },
  { id:'viola',    icon:'💜', name:'Galattico',        desc:'Viola cosmico — sembra uno sfondo di galassia',
    bg:'rgba(40,5,80,.75)',    cellEmpty:'rgba(100,20,180,.15)',   border:'rgba(160,60,255,.25)', price:2500 },
  { id:'oro',      icon:'✨', name:'Oro puro',         desc:'Dorato lussuoso — solo per chi vince',
    bg:'rgba(60,40,0,.75)',    cellEmpty:'rgba(160,110,0,.18)',    border:'rgba(255,200,0,.28)', price:3000 },
  { id:'ghiaccio', icon:'🧊', name:'Ghiaccio',         desc:'Cristallino e freddo come il polo nord',
    bg:'rgba(5,50,80,.72)',    cellEmpty:'rgba(100,200,240,.12)',  border:'rgba(160,230,255,.3)', price:3500 },
];

// ── Moltiplicatori punti ──
const MULTIPLIERS = [
  { id:'x2',  icon:'✖️2',  name:'Moltiplicatore x2',  desc:'Raddoppia tutti i punti guadagnati per una partita completa', mult:2, duration:'1 partita', price:3000,

  { id:'x3',  icon:'✖️3',  name:'Moltiplicatore x3',  desc:'Triplica tutti i punti per una partita intera', mult:3, duration:'1 partita', price:5000,

  { id:'x5',  icon:'✖️5',  name:'Moltiplicatore x5',  desc:'Quintuplica i punti — vai a caccia di record!', mult:5, duration:'1 partita', price:8000,

// ── Storage ──
function getOwnedSets(){ try{return JSON.parse(localStorage.getItem('fb_owned_sets')||'["frutta"]');}catch(e){return['frutta'];} }
function saveOwnedSets(a){ localStorage.setItem('fb_owned_sets',JSON.stringify(a)); }
function getActiveSetId(){ return localStorage.getItem('fb_active_set')||'frutta'; }
function saveActiveSetId(id){ localStorage.setItem('fb_active_set',id); }

function getOwnedColors(){ try{return JSON.parse(localStorage.getItem('fb_owned_colors')||'["default"]');}catch(e){return['default'];} }
function saveOwnedColors(a){ localStorage.setItem('fb_owned_colors',JSON.stringify(a)); }
function getActiveColorId(){ return localStorage.getItem('fb_active_color_id')||'default'; }
function saveActiveColorId(id){
  localStorage.setItem('fb_active_color_id', id);
  const theme = COLOR_THEMES.find(c=>c.id===id);
  // Save the hex for game.html to read
  if(!theme || id==='default') localStorage.removeItem('fb_active_color');
  else localStorage.setItem('fb_active_color', JSON.stringify(theme.colors));
}

function showToast(msg){
  const t=document.getElementById('shop-toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2400);
}

// ── Powerup catalogue ──
const POWERUPS = [
  { id:'bomb',  icon:'💣', name:'Bomba',            desc:'Distrugge area 5×5 sulla griglia — devastante!', price:500,  color:'rgba(231,76,60,.18)',  border:'rgba(231,76,60,.4)'  },
  { id:'lh',    icon:'⚡', name:'Fulmine orizzontale',desc:'Elimina una riga intera istantaneamente',           price:250,  color:'rgba(241,196,15,.15)', border:'rgba(241,196,15,.4)' },
  { id:'lv',    icon:'🌩️', name:'Fulmine verticale',  desc:'Elimina una colonna intera istantaneamente',        price:250,  color:'rgba(241,196,15,.15)', border:'rgba(241,196,15,.4)' },
  { id:'ice',   icon:'❄️', name:'Ghiaccio',           desc:'Congela le celle attorno per 2 turni',              price:250,  color:'rgba(100,200,255,.12)',border:'rgba(100,200,255,.4)' },
  { id:'hint',  icon:'💡', name:'Suggerimento',       desc:'Evidenzia la mossa migliore disponibile',           price:500,  color:'rgba(255,215,0,.12)', border:'rgba(255,215,0,.4)'  },
];

function getInv(k){ return parseInt(localStorage.getItem('fb_inv_'+k)||'0'); }
function setInv(k,n){ localStorage.setItem('fb_inv_'+k,Math.max(0,n)); }

function renderPowerups(){
  const credits=getBonusPoints();
  document.getElementById('credits-val').textContent=credits.toLocaleString();
  const panel=document.getElementById('panel-powerup');
  panel.innerHTML='';

  POWERUPS.forEach(pu=>{
    const owned=getInv(pu.id);
    const canAfford=credits>=pu.price;
    const card=document.createElement('div');
    card.className='item-card';
    card.style.cssText=`border-color:${pu.border};background:${pu.color};`;

    card.innerHTML=`
      <div class="ic-head" style="margin-bottom:6px;">
        <div class="ic-main-icon" style="font-size:32px;">${pu.icon}</div>
        <div class="ic-info">
          <div class="ic-name">${pu.name}</div>
          <div class="ic-desc">${pu.desc}</div>
        </div>
        <div class="pu-owned-badge">${owned}<span style="font-size:9px;color:rgba(255,255,255,.5);margin-left:2px;">poss.</span></div>
      </div>
      <div class="ic-footer">
        <div class="ic-price">${pu.price.toLocaleString()} 💎 <span style="font-size:10px;color:rgba(255,255,255,.4);">/ pezzo</span></div>
        <div style="display:flex;gap:6px;">
          <button class="btn-buy-pu" data-id="${pu.id}" data-qty="1" ${canAfford?'':'disabled'}>+1</button>
          <button class="btn-buy-pu btn-buy-5" data-id="${pu.id}" data-qty="5" ${credits>=pu.price*5?'':'disabled'}>+5</button>
        </div>
      </div>`;
    panel.appendChild(card);
  });

  panel.querySelectorAll('.btn-buy-pu:not(:disabled)').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const pu=POWERUPS.find(p=>p.id===btn.dataset.id); if(!pu)return;
      const qty=parseInt(btn.dataset.qty)||1;
      const total=pu.price*qty;
      const pts=getBonusPoints(); if(pts<total){showToast('❌ Punti insufficienti!');return;}
      localStorage.setItem('fb_bonus',pts-total);
      setInv(pu.id,getInv(pu.id)+qty);
      showToast(`✅ ${pu.icon} ×${qty} acquistati!`);
      renderPowerups(); updateCredits();
    });
  });
}

// ── Storage sfondi ──
function getActiveGridThemeId(){ return localStorage.getItem('fb_active_grid')||'default'; }
function saveActiveGridTheme(id){
  localStorage.setItem('fb_active_grid', id);
  const t=GRID_THEMES.find(x=>x.id===id);
  if(!t||id==='default') localStorage.removeItem('fb_grid_theme_data');
  else localStorage.setItem('fb_grid_theme_data', JSON.stringify({bg:t.bg,cellEmpty:t.cellEmpty,border:t.border}));
}
function getOwnedGrids(){ try{return JSON.parse(localStorage.getItem('fb_owned_grids')||'["default"]');}catch(e){return['default'];} }
function saveOwnedGrids(a){ localStorage.setItem('fb_owned_grids',JSON.stringify(a)); }

// ── Storage moltiplicatori ──
function getInvMulti(id){ return parseInt(localStorage.getItem('fb_inv_multi_'+id)||'0'); }
function setInvMulti(id,n){ localStorage.setItem('fb_inv_multi_'+id,Math.max(0,n)); }
function getActiveMulti(){ return parseInt(localStorage.getItem('fb_active_multi')||'1'); }

// ── Render sfondi ──
function renderSfondi(){
  const credits=getBonusPoints();
  document.getElementById('credits-val').textContent=credits.toLocaleString();
  const owned=getOwnedGrids(), activeId=getActiveGridThemeId();
  const panel=document.getElementById('panel-sfondi');
  panel.innerHTML='';

  GRID_THEMES.forEach(theme=>{
    const isOwned=owned.includes(theme.id), isActive=activeId===theme.id;
    const canAfford=credits>=theme.price;
    const card=document.createElement('div');
    card.className='item-card'+(isActive?' active-card':isOwned?' owned-card':'');

    let html='';
    if(isActive) html+=`<div class="ic-badge active">✦ Attivo</div>`;
    else if(isOwned) html+=`<div class="ic-badge owned">✓ Posseduto</div>`;

    html+=`<div class="ic-head">
      <div class="ic-main-icon">${theme.icon}</div>
      <div class="ic-info"><div class="ic-name">${theme.name}</div><div class="ic-desc">${theme.desc}</div></div>
    </div>`;

    // Grid preview: 4x4 mini grid
    const previewCells = Array(16).fill(0).map((_,i)=>{
      const filled=([0,2,5,7,8,11,13,15].includes(i));
      const bg=filled?'rgba(255,255,255,.45)':theme.cellEmpty;
      return `<div style="width:14px;height:14px;border-radius:3px;background:${bg};border:1px solid ${theme.border};"></div>`;
    }).join('');
    html+=`<div style="display:grid;grid-template-columns:repeat(4,14px);gap:3px;background:${theme.bg};padding:8px;border-radius:10px;margin-bottom:10px;width:fit-content;">${previewCells}</div>`;

    const priceHtml = theme.price===0
      ? `<div class="ic-price free">✓ Gratis</div>`
      : isOwned ? `<div class="ic-price spent">${theme.price.toLocaleString()} 💎</div>`
                : `<div class="ic-price">${theme.price.toLocaleString()} 💎</div>`;

    let btnHtml;
    if(isActive) btnHtml=`<div class="btn-active">✦ In uso</div>`;
    else if(isOwned) btnHtml=`<button class="btn-equip" data-grid="${theme.id}">Usa questo</button>`;
    else if(canAfford) btnHtml=`<button class="btn-buy" data-grid="${theme.id}">Acquista</button>`;
    else btnHtml=`<button class="btn-buy" disabled>🔒 ${theme.price.toLocaleString()}</button>`;

    html+=`<div class="ic-footer">${priceHtml}${btnHtml}</div>`;
    card.innerHTML=html; panel.appendChild(card);
  });

  panel.querySelectorAll('.btn-buy:not(:disabled)').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const theme=GRID_THEMES.find(t=>t.id===btn.dataset.grid); if(!theme)return;
      const pts=getBonusPoints(); if(pts<theme.price){showToast('Punti insufficienti!');return;}
      localStorage.setItem('fb_bonus',pts-theme.price);
      const o=getOwnedGrids(); if(!o.includes(theme.id))o.push(theme.id); saveOwnedGrids(o);
      showToast('Sfondo "'+theme.name+'" acquistato!'); renderSfondi(); updateCredits();
    });
  });
  panel.querySelectorAll('.btn-equip').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const theme=GRID_THEMES.find(t=>t.id===btn.dataset.grid); if(!theme)return;
      saveActiveGridTheme(theme.id); showToast('Sfondo "'+theme.name+'" attivato!'); renderSfondi();
    });
  });
}

// ── Render moltiplicatori ──
function renderMulti(){
  const credits=getBonusPoints();
  document.getElementById('credits-val').textContent=credits.toLocaleString();
  const panel=document.getElementById('panel-multi');
  panel.innerHTML='';

  // Banner moltiplicatore attivo
  const activeMult=getActiveMulti();
  if(activeMult>1){
    panel.innerHTML+=`<div style="background:linear-gradient(135deg,rgba(255,215,0,.18),rgba(255,150,0,.1));border:2px solid rgba(255,215,0,.45);border-radius:14px;padding:12px 14px;text-align:center;margin-bottom:4px;">
      <div style="font-family:Fredoka One,cursive;font-size:22px;color:var(--gold);">✖️${activeMult} ATTIVO</div>
      <div style="font-size:11px;color:rgba(255,215,0,.7);margin-top:3px;">Moltiplicatore attivo per questa partita</div>
    </div>`;
  }

  MULTIPLIERS.forEach(m=>{
    const owned=getInvMulti(m.id);
    const canAfford=credits>=m.price;
    const card=document.createElement('div');
    card.className='item-card';
    card.style.cssText=`border-color:${m.border};background:${m.color};`;

    card.innerHTML=`
      <div class="ic-head" style="margin-bottom:6px;">
        <div style="font-family:Fredoka One,cursive;font-size:28px;color:#fff;min-width:52px;text-align:center;line-height:1;">${m.icon}</div>
        <div class="ic-info">
          <div class="ic-name">${m.name}</div>
          <div class="ic-desc">${m.desc}</div>
          <div style="font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;">⏱ Dura: ${m.duration}</div>
        </div>
        <div class="pu-owned-badge">${owned}<span style="font-size:9px;color:rgba(255,255,255,.5);margin-left:2px;">poss.</span></div>
      </div>
      <div class="ic-footer">
        <div class="ic-price">${m.price.toLocaleString()} 💎 <span style="font-size:10px;color:rgba(255,255,255,.4);">/ pezzo</span></div>
        <div style="display:flex;gap:6px;">
          <button class="btn-buy-pu" data-mid="${m.id}" data-qty="1" ${canAfford?'':'disabled'}>+1</button>
          <button class="btn-buy-pu btn-buy-5" data-mid="${m.id}" data-qty="3" ${credits>=m.price*3?'':'disabled'}>+3</button>
        </div>
      </div>`;
    panel.appendChild(card);
  });

  panel.querySelectorAll('.btn-buy-pu:not(:disabled)').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const m=MULTIPLIERS.find(x=>x.id===btn.dataset.mid); if(!m)return;
      const qty=parseInt(btn.dataset.qty)||1;
      const total=m.price*qty;
      const pts=getBonusPoints(); if(pts<total){showToast('Punti insufficienti!');return;}
      localStorage.setItem('fb_bonus',pts-total);
      setInvMulti(m.id,getInvMulti(m.id)+qty);
      showToast('✅ '+m.name+' x'+qty+' acquistati!'); renderMulti(); updateCredits();
    });
  });
}

function updateCredits(){
  document.getElementById('credits-val').textContent = getBonusPoints().toLocaleString();
}

// ── Tabs ──
document.querySelectorAll('.shop-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.shop-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.shop-panel').forEach(p=>p.classList.remove('visible'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.tab).classList.add('visible');
    const renders={powerup:renderPowerups,multi:renderMulti,sfondi:renderSfondi,emoji:renderEmoji,colori:renderColors};
    if(renders[tab.dataset.tab]) renders[tab.dataset.tab]();
    updateCredits();
  });
});

document.getElementById('back-btn').addEventListener('click',()=>location.href='index.html');

updateCredits();
renderPowerups();
renderMulti();
renderSfondi();
renderEmoji();
renderColors();
</script>
