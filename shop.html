<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-title" content="FruitBlast">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🛒 Negozio — FruitBlast</title>
<link rel="stylesheet" href="style.css">
<style>
.shop-page{ gap:10px; }

.credits-bar{
  width:100%;
  background:linear-gradient(135deg,rgba(138,43,226,.22),rgba(75,0,130,.15));
  border:1px solid rgba(180,100,255,.32);
  border-radius:14px; padding:10px 14px;
  display:flex; align-items:center; gap:12px;
  position:relative; overflow:hidden;
}
.credits-bar::before{
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent,rgba(180,100,255,.07),transparent);
  animation:cShimmer 4s infinite;
}
@keyframes cShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.cb-gem{ font-size:24px; filter:drop-shadow(0 0 8px rgba(200,100,255,.7)); flex-shrink:0; }
.cb-info{ flex:1; }
.cb-label{ font-size:10px; color:rgba(200,150,255,.7); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:2px; }
.cb-val{ font-family:'Fredoka One',cursive; font-size:clamp(20px,6vw,26px); color:#d4a8ff; line-height:1; }
.cb-sub{ font-size:10px; color:rgba(200,150,255,.45); margin-top:2px; }

.section-label{
  font-size:10px; color:rgba(255,255,255,.38);
  text-transform:uppercase; letter-spacing:2px;
  text-align:center; width:100%;
}

.sets-grid{ display:flex; flex-direction:column; gap:9px; width:100%; }

.set-card{
  width:100%; border-radius:16px; padding:12px 14px;
  background:var(--glass); border:2px solid var(--gb);
  position:relative; overflow:hidden;
  transition:border-color .2s, box-shadow .2s;
}
.set-card.owned{ border-color:rgba(46,204,113,.25); }
.set-card.active-set{
  border-color:var(--gold);
  box-shadow:0 4px 18px rgba(255,215,0,.2);
}
.set-card.active-set::before{
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg,var(--gold),#ff9f43);
}

.sc-head{ display:flex; align-items:center; gap:10px; margin-bottom:9px; }
.sc-cat-icon{ font-size:28px; line-height:1; flex-shrink:0; }
.sc-info{ flex:1; min-width:0; }
.sc-name{ font-family:'Fredoka One',cursive; font-size:17px; color:#fff; margin-bottom:1px; }
.sc-desc{ font-size:11px; color:rgba(255,255,255,.5); line-height:1.3; }

.sc-emojis{
  display:flex; gap:5px; flex-wrap:wrap;
  background:rgba(255,255,255,.04); border-radius:10px;
  padding:7px 9px; margin-bottom:10px;
}
.sc-emojis span{ font-size:20px; line-height:1; }

.sc-footer{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
.sc-price{ font-family:'Fredoka One',cursive; font-size:15px; color:#d4a8ff; }
.sc-price.free{ color:var(--green); }
.sc-price.spent{ color:rgba(255,255,255,.25); }

.sc-badge{
  position:absolute; top:9px; right:9px;
  font-size:10px; font-weight:900;
  border-radius:7px; padding:2px 7px; letter-spacing:.5px;
}
.sc-badge.owned{ background:rgba(46,204,113,.18); color:#2ecc71; border:1px solid rgba(46,204,113,.3); }
.sc-badge.active{ background:rgba(255,215,0,.15); color:var(--gold); border:1px solid rgba(255,215,0,.3); }

.btn-buy{
  background:linear-gradient(135deg,#9b59b6,#6c3483);
  color:#fff; border:none; border-radius:10px;
  padding:8px 16px; font-size:13px; font-weight:900;
  font-family:'Nunito',sans-serif; cursor:pointer;
  box-shadow:0 3px 10px rgba(155,89,182,.35);
  transition:transform .15s;
  white-space:nowrap;
}
.btn-buy:active{ transform:scale(.95); }
.btn-buy:disabled{ opacity:.35; cursor:default; background:rgba(255,255,255,.1); box-shadow:none; }

.btn-equip{
  background:linear-gradient(135deg,#27ae60,#1e8449);
  color:#fff; border:none; border-radius:10px;
  padding:8px 16px; font-size:13px; font-weight:900;
  font-family:'Nunito',sans-serif; cursor:pointer;
  box-shadow:0 3px 10px rgba(39,174,96,.3);
  transition:transform .15s;
}
.btn-equip:active{ transform:scale(.95); }

.btn-active{
  background:rgba(255,215,0,.12); color:var(--gold);
  border:1px solid rgba(255,215,0,.3); border-radius:10px;
  padding:8px 16px; font-size:13px; font-weight:900;
  font-family:'Nunito',sans-serif;
}

#shop-toast{
  position:fixed;
  bottom:calc(env(safe-area-inset-bottom,0px) + 24px);
  left:50%; transform:translateX(-50%) translateY(16px);
  background:rgba(20,8,46,.97); border:1px solid rgba(255,255,255,.18);
  color:#fff; font-size:14px; font-weight:700;
  border-radius:50px; padding:10px 24px;
  opacity:0; transition:opacity .22s, transform .22s;
  z-index:999; white-space:nowrap; pointer-events:none;
  font-family:'Nunito',sans-serif;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
#shop-toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(reg => {
    reg.update();
    reg.addEventListener('updatefound', () => {
      const sw = reg.installing;
      sw.addEventListener('statechange', () => {
        if(sw.state === 'installed' && navigator.serviceWorker.controller) window.location.reload();
      });
    });
  });
  navigator.serviceWorker.addEventListener('message', e => {
    if(e.data && e.data.type === 'SW_UPDATED') window.location.reload();
  });
}
</script>
</head>
<body>
<div id="app">
<div class="page shop-page fade-in sub-page">

  <div class="page-header">
    <button class="back-btn" id="back-btn">← Menu</button>
    <div class="page-title">🛒 Negozio</div>
  </div>

  <div class="credits-bar">
    <div class="cb-gem">💎</div>
    <div class="cb-info">
      <div class="cb-label">I tuoi Punti Bonus</div>
      <div class="cb-val" id="credits-val">0</div>
      <div class="cb-sub">Guadagna punti completando gli obiettivi</div>
    </div>
  </div>

  <div class="section-label">🎨 Set Emoji — usa in partita</div>
  <div class="sets-grid" id="sets-grid"></div>

</div>
</div>

<div id="shop-toast"></div>

<script src="data.js"></script>
<script>
const EMOJI_SETS = [
  {
    id: 'frutta',
    name: 'Frutta classica',
    icon: '🍉',
    desc: 'Il set originale — frutta fresca e colorata',
    emojis: ['🍎','🍊','🍋','🍇','🍓','🫐','🍑','🍒','🥝','🍍'],
    price: 0,
  },
  {
    id: 'cibo',
    name: 'Cibo & Dolci',
    icon: '🍕',
    desc: 'Pizza, gelato, sushi e altri sfizi deliziosi',
    emojis: ['🍕','🍔','🌮','🍣','🍩','🎂','🧁','🍫','🍦','🥐'],
    price: 300,
  },
  {
    id: 'animali',
    name: 'Animali',
    icon: '🦁',
    desc: 'Savana, mare e giungla sulla tua griglia',
    emojis: ['🦁','🐘','🦊','🐧','🦋','🐬','🦄','🐸','🦀','🐙'],
    price: 400,
  },
  {
    id: 'spazio',
    name: 'Spazio',
    icon: '🚀',
    desc: 'Stelle, pianeti e galassie nel tuo gioco',
    emojis: ['🚀','🌙','⭐','🪐','☄️','🛸','🌌','💫','🔭','👾'],
    price: 500,
  },
  {
    id: 'sport',
    name: 'Sport',
    icon: '⚽',
    desc: 'Per i veri campioni dentro e fuori dal campo',
    emojis: ['⚽','🏀','🎾','🏈','⚾','🏐','🎱','🏓','🥊','🎯'],
    price: 350,
  },
  {
    id: 'natura',
    name: 'Natura & Piante',
    icon: '🌸',
    desc: 'Fiori, foglie e la bellezza del mondo naturale',
    emojis: ['🌸','🌺','🌻','🌴','🍄','🌊','🔥','❄️','🌈','⚡'],
    price: 450,
  },
];

function getOwnedSets(){
  try{ return JSON.parse(localStorage.getItem('fb_owned_sets')||'["frutta"]'); }
  catch(e){ return ['frutta']; }
}
function saveOwnedSets(arr){ localStorage.setItem('fb_owned_sets', JSON.stringify(arr)); }
function getActiveSetId(){ return localStorage.getItem('fb_active_set')||'frutta'; }
function saveActiveSetId(id){ localStorage.setItem('fb_active_set', id); }

function showToast(msg){
  const t = document.getElementById('shop-toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 2200);
}

function renderShop(){
  const credits = getBonusPoints();
  document.getElementById('credits-val').textContent = credits.toLocaleString();
  const owned = getOwnedSets();
  const activeId = getActiveSetId();
  const grid = document.getElementById('sets-grid');
  grid.innerHTML = '';

  EMOJI_SETS.forEach(set => {
    const isOwned = owned.includes(set.id);
    const isActive = activeId === set.id;
    const canAfford = credits >= set.price;

    const card = document.createElement('div');
    card.className = 'set-card' + (isActive ? ' active-set' : isOwned ? ' owned' : '');

    let html = '';

    // Badge
    if(isActive) html += `<div class="sc-badge active">✦ Attivo</div>`;
    else if(isOwned) html += `<div class="sc-badge owned">✓ Posseduto</div>`;

    // Head
    html += `
      <div class="sc-head">
        <div class="sc-cat-icon">${set.icon}</div>
        <div class="sc-info">
          <div class="sc-name">${set.name}</div>
          <div class="sc-desc">${set.desc}</div>
        </div>
      </div>`;

    // Emoji preview
    html += `<div class="sc-emojis">${set.emojis.map(e=>`<span>${e}</span>`).join('')}</div>`;

    // Footer
    const priceHtml = set.price === 0
      ? `<div class="sc-price free">✓ Gratis</div>`
      : isOwned
        ? `<div class="sc-price spent">${set.price.toLocaleString()} 💎</div>`
        : `<div class="sc-price">${set.price.toLocaleString()} 💎</div>`;

    let btnHtml;
    if(isActive){
      btnHtml = `<div class="btn-active">✦ In uso</div>`;
    } else if(isOwned){
      btnHtml = `<button class="btn-equip" data-id="${set.id}">Usa questo</button>`;
    } else {
      if(canAfford){
        btnHtml = `<button class="btn-buy" data-id="${set.id}">Acquista</button>`;
      } else {
        btnHtml = `<button class="btn-buy" disabled>🔒 Servono ${set.price.toLocaleString()}</button>`;
      }
    }

    html += `<div class="sc-footer">${priceHtml}${btnHtml}</div>`;
    card.innerHTML = html;
    grid.appendChild(card);
  });

  // Bind
  grid.querySelectorAll('.btn-buy:not(:disabled)').forEach(btn => {
    btn.addEventListener('click', () => {
      const set = EMOJI_SETS.find(s => s.id === btn.dataset.id);
      if(!set) return;
      const pts = getBonusPoints();
      if(pts < set.price){ showToast('❌ Punti insufficienti!'); return; }
      localStorage.setItem('fb_bonus', pts - set.price);
      const owned2 = getOwnedSets();
      if(!owned2.includes(set.id)) owned2.push(set.id);
      saveOwnedSets(owned2);
      showToast(`✅ "${set.name}" acquistato!`);
      renderShop();
    });
  });

  grid.querySelectorAll('.btn-equip').forEach(btn => {
    btn.addEventListener('click', () => {
      const set = EMOJI_SETS.find(s => s.id === btn.dataset.id);
      if(!set) return;
      saveActiveSetId(set.id);
      showToast(`🎨 "${set.name}" attivato!`);
      renderShop();
    });
  });
}

document.getElementById('back-btn').addEventListener('click', () => location.href = 'index.html');
renderShop();
</script>
</body>
</html>
