<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="foto_sfondo.png">
<link rel="apple-touch-icon" href="foto_sfondo.png">
<meta name="apple-mobile-web-app-title" content="FruitBlast">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🍉 FruitBlast</title>
<link rel="stylesheet" href="style.css">
<style>
/* ── Game layout ── */
#game-screen{gap:0;padding-top:calc(var(--sat) + 6px);justify-content:space-between;min-height:100%;padding-bottom:calc(var(--sab) + 6px);}
.g-header{display:flex;align-items:center;width:100%;justify-content:space-between;gap:8px;}
.g-logo{font-family:'Fredoka One',cursive;font-size:19px;color:#fff;}
.g-left{display:flex;gap:6px;}
#score-area{display:flex;flex-direction:column;align-items:center;
  background:var(--glass);border-radius:12px;padding:5px 13px;
  border:1px solid var(--gb);min-width:78px;}
.slbl{font-size:9px;color:rgba(255,255,255,.42);letter-spacing:1px;text-transform:uppercase;}
#score{font-family:'Fredoka One',cursive;font-size:clamp(20px,6vw,26px);color:var(--gold);line-height:1;}
#combo-lbl{font-size:10px;color:#ff6b6b;font-weight:900;min-height:13px;}
#combo-grace{display:none;align-items:center;gap:3px;}
.grace-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .3s,transform .2s;}
.grace-dot.lit{background:#ff9f43;transform:scale(1.2);}
.grace-dot.low{background:#e74c3c;}
.g-icon-btn{background:var(--glass);border:1px solid var(--gb);color:#fff;
  border-radius:10px;cursor:pointer;font-size:18px;
  min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;}
.g-icon-btn:active{background:rgba(255,255,255,.18);}
.g-info-row{display:flex;gap:6px;align-items:stretch;width:100%;}
#mission-bar{background:var(--glass);border-radius:10px;padding:6px 12px;
  font-size:12px;color:rgba(255,255,255,.68);border:1px solid var(--gb);
  flex:1;display:flex;align-items:center;gap:5px;}
#mission-prog{color:var(--gold);font-weight:900;}
#diff-pill{font-size:11px;font-weight:900;border-radius:10px;padding:0 11px;
  display:flex;align-items:center;border:1px solid;white-space:nowrap;}
.stat-row{display:flex;gap:10px;font-size:11px;color:rgba(255,255,255,.52);justify-content:center;}
.stat-row b{color:rgba(255,255,255,.88);font-weight:900;}
 
 
 
/* Grid */
#grid-wrap{background:rgba(255,255,255,.04);border-radius:15px;
  padding:6px;border:2px solid rgba(255,255,255,.1);
  box-shadow:0 0 32px rgba(80,30,180,.16);}
#grid{display:grid;}
.cell{border-radius:6px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;}
.cell.filled{background:rgba(255,255,255,.1);}
.cell.highlight{background:rgba(255,255,200,.22);border-color:rgba(255,255,80,.55);
  transform:scale(1.07);z-index:2;transition:background .06s,transform .06s;}
.cell.invalid{background:rgba(255,50,50,.18);border-color:rgba(255,100,100,.44);}
.cell.clearing{animation:pop .4s cubic-bezier(.36,.07,.19,.97) forwards;}
@keyframes pop{0%{transform:scale(1);opacity:1}35%{transform:scale(1.28);opacity:.8}100%{transform:scale(0) rotate(12deg);opacity:0}}
.cell.just-placed{animation:land .17s cubic-bezier(.34,1.56,.64,1);}
@keyframes land{from{transform:scale(.65)}to{transform:scale(1)}}
.cell.frozen{background:rgba(130,210,255,.15)!important;border-color:rgba(130,220,255,.48)!important;cursor:not-allowed;}
.cell.frozen::after{content:'❄';position:absolute;font-size:8px;bottom:1px;right:1px;opacity:.5;line-height:1;}
.cell.freeze-anim{animation:freeze .44s cubic-bezier(.34,1.56,.64,1);}
@keyframes freeze{0%{background:rgba(180,240,255,.5);transform:scale(1.1)}100%{background:rgba(130,210,255,.15);transform:scale(1)}}
 
/* Shapes */
#shapes-area{display:flex;gap:7px;justify-content:center;width:100%;flex-shrink:0;}
.shape-slot{touch-action:manipulation;background:rgba(255,255,255,.07);border-radius:13px;
  border:2px solid rgba(255,255,255,.11);
  flex:1;max-width:32%;min-height:76px;
  display:flex;align-items:center;justify-content:center;
  cursor:grab;position:relative;padding:9px 5px;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,border-color .2s;}
.shape-slot.selected{border-color:var(--gold);
  box-shadow:0 0 18px rgba(255,215,0,.36),0 4px 16px rgba(255,215,0,.16);
  transform:translateY(-5px) scale(1.06);background:rgba(255,215,0,.07);}
.shape-slot.dragging-source{opacity:.35;transform:scale(.95)!important;}
.shape-slot.used{opacity:.12;cursor:default;transform:none!important;box-shadow:none!important;border-color:rgba(255,255,255,.06)!important;}
.sgrid{display:grid;pointer-events:none;}
.sc{border-radius:4px;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.sc.empty{background:transparent!important;}
.sp-badge{position:absolute;top:4px;right:4px;font-size:10px;
  background:rgba(255,85,35,.8);color:#fff;border-radius:6px;padding:1px 5px;font-weight:900;}
 
/* Drag ghost */
#drag-ghost{
  position:fixed;pointer-events:none;z-index:1000;display:none;opacity:.9;
  background:rgba(20,10,40,.82);border-radius:12px;padding:8px;
  border:2px solid rgba(255,215,0,.6);
  box-shadow:0 0 24px rgba(255,215,0,.35),0 4px 16px rgba(0,0,0,.5);
  will-change:left,top;
}
 
/* Game over */
#go-screen{gap:14px;padding-top:calc(var(--sat) + 8px);padding-bottom:calc(var(--sab) + 12px);text-align:center;justify-content:center;min-height:100vh;min-height:100dvh;}
.go-emoji{font-size:clamp(54px,15vw,70px);animation:gbounce .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes gbounce{from{transform:scale(0) rotate(-10deg)}to{transform:scale(1) rotate(0)}}
.go-title{font-family:'Fredoka One',cursive;font-size:clamp(36px,11vw,48px);color:var(--gold);}
.go-score{font-family:'Fredoka One',cursive;font-size:clamp(50px,14vw,64px);color:#fff;}
#go-new-rec{background:linear-gradient(135deg,rgba(255,215,0,.13),rgba(255,150,0,.08));
  border:1px solid rgba(255,215,0,.26);border-radius:12px;
  padding:6px 22px;font-size:14px;font-weight:900;color:var(--gold);
  letter-spacing:1px;text-transform:uppercase;}
.go-cards{display:flex;gap:7px;width:100%;}
.go-card{flex:1;background:var(--glass);border:1px solid var(--gb);border-radius:13px;padding:11px 5px;text-align:center;}
.gc-lbl{font-size:10px;color:rgba(255,255,255,.42);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.gc-val{font-family:'Fredoka One',cursive;font-size:clamp(18px,5vw,22px);color:#fff;}
#play-again-btn{background:linear-gradient(135deg,#ff6b6b,#ff9f43);color:#fff;border:none;
  padding:clamp(13px,4vw,15px) 0;border-radius:50px;
  font-size:clamp(18px,5.5vw,22px);font-family:'Fredoka One',cursive;
  cursor:pointer;box-shadow:0 6px 20px rgba(255,107,107,.35);width:100%;max-width:300px;}
#play-again-btn:active{transform:scale(.96);}
#go-menu-btn{background:var(--glass);color:rgba(255,255,255,.62);
  border:1px solid var(--gb);padding:10px 0;border-radius:50px;
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:'Nunito',sans-serif;width:100%;max-width:300px;text-align:center;}
#go-menu-btn:active{background:rgba(255,255,255,.14);}
 
 
 
.cell.line-ready{background:rgba(255,230,80,.18);border-color:rgba(255,220,60,.5);transition:background .08s,border-color .08s;}
.cell.line-complete{background:rgba(100,255,160,.28);border-color:rgba(80,255,140,.7);box-shadow:inset 0 0 6px rgba(80,255,140,.25);transition:background .08s,border-color .08s;z-index:1;}
.cell.bomb-zone{background:rgba(255,80,80,.2);border-color:rgba(255,100,80,.55);transition:background .08s;}
#fscore{position:fixed;pointer-events:none;font-family:'Fredoka One',cursive;font-size:20px;
  color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,.7);z-index:999;opacity:0;
  transition:opacity .65s,transform .65s;}
</style>
 
<script>
// Registra Service Worker per cache automatica
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js')
    .then(reg => {
      // Controlla aggiornamenti ogni volta che la pagina si apre
      reg.update();
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        newSW.addEventListener('statechange', () => {
          if(newSW.state === 'installed' && navigator.serviceWorker.controller){
            // Nuovo contenuto disponibile — ricarica silenzioso
            window.location.reload();
          }
        });
      });
    });
}
</script>
</head>
<body>
<div id="app">
 
<!-- GAME -->
<div id="game-screen" class="page fade-in">
  <div class="g-header">
    <div class="g-left">
      <button class="g-icon-btn" id="menu-btn">🏠</button>
    </div>
    <div class="g-logo">🍉 FruitBlast</div>
    <div id="score-area">
      <div class="slbl">SCORE</div>
      <div id="score">0</div>
      <div id="combo-lbl"></div>
      <div id="combo-grace"><div class="grace-dot" id="gd0"></div><div class="grace-dot" id="gd1"></div><div class="grace-dot" id="gd2"></div><div class="grace-dot" id="gd3"></div></div>
    </div>
  </div>
  <div class="g-info-row">
    <div id="mission-bar">🎯 Linee: <span id="mission-prog">0/8</span></div>
    <div id="diff-pill"></div>
  </div>
  <div class="stat-row">
    <span>💣 <b id="stat-bomb">2</b></span>
    <span>⚡ <b id="stat-lh">1</b></span>
    <span>🌩️ <b id="stat-lv">1</b></span>
    <span>❄️ <b id="stat-ice">2</b></span>
    <span>🏆 <b id="best-score">0</b></span>
  </div>
 
  <div id="grid-wrap"><div id="grid"></div></div>
  <div id="shapes-area"></div>
</div>
 
<!-- GAME OVER -->
<div id="go-screen" class="page" style="display:none;">
  <div class="go-emoji">🍉💥</div>
  <div class="go-title">Game Over!</div>
  <div class="go-score" id="go-final">0</div>
  <div id="go-new-rec" style="display:none">🏆 Nuovo Record!</div>
  <div class="go-cards">
    <div class="go-card"><div class="gc-lbl">Difficoltà</div><div class="gc-val" id="go-diff-v">—</div></div>
    <div class="go-card"><div class="gc-lbl">Record</div><div class="gc-val" id="go-best-v">0</div></div>
    <div class="go-card"><div class="gc-lbl">Linee</div><div class="gc-val" id="go-lines-v">0</div></div>
  </div>
  <button id="play-again-btn">🔄 Rigioca</button>
  <button id="go-menu-btn">🏠 Menu principale</button>
</div>
 
</div><!-- #app -->
<div id="drag-ghost"><div class="sgrid" id="ghost-grid"></div></div>
<div id="fscore"></div>
 
<script src="data.js"></script>
<script>
// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
const $=id=>document.getElementById(id);
const diff = sessionStorage.getItem('fb_diff')||'easy';
const cfg  = DCFG[diff];
let SET    = getSettings();
 
// ── game state ──
let GS, grid, score, shapes, sel, combo, comboGrace, lines, mission, frozen;
let dragShape=null, dragAnchorR=0, dragAnchorC=0, dragPreviewR=-1, dragPreviewC=-1;
let mouseDown=false;
let touchPendingIdx=-1, touchPendingX=0, touchPendingY=0;
const DRAG_THRESHOLD=8; // pixel di movimento minimo per iniziare drag
 
// ── per-run stats (tracked for objectives) ──
let runStats={};
function resetRunStats(){
  runStats={lines:0,score:0,combo:0,useBomb:0,useLH:0,useLV:0,useIce:0,
            placed:0,bigShape:0,multiLine:0,turns:0,pureLines:0};
}
 
// ── objective state ──
let objState, activeObj;
 
// ════════════════════════════════════════
//  OBJECTIVE HELPERS
// ════════════════════════════════════════
function loadObjState(){
  objState = getObjState(diff);
  const objs = OBJECTIVES[diff];
  const idx  = Math.min(objState.currentIdx||0, objs.length-1);
  activeObj  = objs[idx];
}
 
function getObjProgress(){
  if(!activeObj) return 0;
  const t = activeObj.type;
  if(t==='score')     return score;
  if(t==='combo')     return runStats.combo;
  if(t==='bigShape')  return runStats.bigShape;
  if(t==='multiLine') return runStats.multiLine;
  return runStats[t]||0;
}
 
function updObjMini(){ /* mini bar removed — objectives visible from menu only */ }
 
function trackStat(type, val){
  if(type==='lines')    { runStats.lines    +=val; }
  if(type==='useBomb')  { runStats.useBomb  +=1;   }
  if(type==='useLH')    { runStats.useLH    +=1;   }
  if(type==='useLV')    { runStats.useLV    +=1;   }
  if(type==='useIce')   { runStats.useIce   +=1;   }
  if(type==='placed')   { runStats.placed   +=val; }
  if(type==='turns')    { runStats.turns    +=1;   }
  if(type==='multiLine'&&val>runStats.multiLine) runStats.multiLine=val;
  if(type==='bigShape' &&val>runStats.bigShape)  runStats.bigShape=val;
  if(type==='combo'    &&val>runStats.combo)      runStats.combo=val;
  // score is always from global score variable
  checkObjProgress();
}
 
function checkObjProgress(){
  if(!activeObj) return;
  if((objState.completed||[]).includes(activeObj.id)) return;
  const prog = getObjProgress();
  updObjMini();
  if(prog >= activeObj.target) completeObjective();
}
 
function completeObjective(){
  if(!activeObj) return;
  if(!objState.completed) objState.completed=[];
  if(objState.completed.includes(activeObj.id)) return;
 
  objState.completed.push(activeObj.id);
  score += activeObj.reward;
  addBonusPoints(activeObj.reward); // accumulate in global bonus wallet
  updScore();
 
  // objective completed (toast removed)
 
  // advance to next objective
  const objs = OBJECTIVES[diff];
  const nextIdx = objState.currentIdx+1;
  if(nextIdx < objs.length){
    objState.currentIdx = nextIdx;
    activeObj = objs[nextIdx];
  } else {
    activeObj = null; // all done
  }
  saveObjState(diff, objState);
 
  // persist best stats for objectives page
  saveRunStats();
  updObjMini();
}
 
function saveRunStats(){
  // merge with existing best stats (keep highest values)
  let stored={};
  try{ const r=localStorage.getItem('fb_stats_'+diff); if(r) stored=JSON.parse(r); }catch(e){}
  const merged={};
  const keys=['lines','score','combo','useBomb','useLH','useLV','useIce','placed','bigShape','multiLine','turns'];
  keys.forEach(k=>{
    const cur = k==='score'?score:runStats[k]||0;
    merged[k] = Math.max(stored[k]||0, cur);
  });
  localStorage.setItem('fb_stats_'+diff, JSON.stringify(merged));
}
 
// ════════════════════════════════════════
//  GAME INIT
// ════════════════════════════════════════
function startGame(){
  GS=cfg.gs;
  grid=Array.from({length:GS},()=>Array(GS).fill(null));
  frozen={}; score=0; combo=0; comboGrace=0; lines=0; mission=cfg.ms; sel=null; dragShape=null;
  resetRunStats();
  loadObjState();
 
  $('stat-bomb').textContent=2; $('stat-lh').textContent=1;
  $('stat-lv').textContent=1;   $('stat-ice').textContent=2;
 
  const p=$('diff-pill');
  p.textContent=cfg.lbl;
  p.style.cssText=`font-size:11px;font-weight:900;border-radius:10px;padding:0 11px;display:flex;align-items:center;border:1px solid ${cfg.col};color:${cfg.col};background:${cfg.col}22;`;
 
  updScore();
  $('best-score').textContent=getBest(diff).toLocaleString();
  updMission();
  updObjMini();
  renderGrid();
  genShapes();
 
  $('game-screen').style.display='flex';
  $('go-screen').style.display='none';
}
 
function animD(){ return SET.anim?(SET.speed==='fast'?200:SET.speed==='slow'?680:420):50; }
function getFruit(){ return SET.fruit?FRUITS[Math.floor(Math.random()*FRUITS.length)]:'■'; }
 
// ════════════════════════════════════════
//  GRID
// ════════════════════════════════════════
function calcCS(){
  const vw = Math.min(window.innerWidth, 480);
  const vh = window.innerHeight;
  // Available height for grid: total - safe areas - header - info row - stats - shapes - gaps
  const safeTop = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sat'))||44;
  const safeBot = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sab'))||20;
  const usedV = safeTop + safeBot + 48 + 34 + 24 + 100 + 60 + 16; // header+inforow+stats+shapes+gaps+padding
  const availH = vh - usedV;
  // Cell size from width (horizontal constraint)
  const csW = Math.floor((vw - 20 - 12 - 3*(GS-1)) / GS);
  // Cell size from height (vertical constraint)
  const csH = Math.floor(availH / GS);
  // Use the smaller of the two, min 26
  return Math.max(26, Math.min(csW, csH));
}
 
function renderGrid(){
  const g=$('grid'); g.innerHTML='';
  const cs=calcCS(), fs=Math.floor(cs*0.52);
  g.style.cssText=`display:grid;grid-template-columns:repeat(${GS},${cs}px);gap:3px;`;
  for(let r=0;r<GS;r++) for(let c=0;c<GS;c++){
    const el=document.createElement('div');
    el.className='cell'+(grid[r][c]?' filled':'');
    el.dataset.row=r; el.dataset.col=c;
    el.style.cssText=`width:${cs}px;height:${cs}px;font-size:${fs}px;`;
    if(grid[r][c]) el.textContent=grid[r][c];
    if(frozen[r+','+c]) el.classList.add('frozen');
    g.appendChild(el);
  }
  bindGrid();
}
 
function bindGrid(){
  // Solo click per tap-select desktop — touch gestito globalmente
  const old=$('grid'), ng=old.cloneNode(true);
  old.parentNode.replaceChild(ng,old);
  ng.querySelectorAll('.cell').forEach(cell=>{
    cell.addEventListener('click',()=>{ if(sel&&!dragShape)doPlace(+cell.dataset.row,+cell.dataset.col); });
    cell.addEventListener('mouseenter',()=>{ if(sel&&!dragShape)previewAt(+cell.dataset.row,+cell.dataset.col); });
    cell.addEventListener('mouseleave',()=>{ if(sel&&!dragShape)clearHL(); });
  });
}
 
function hideGhost(){ $('drag-ghost').style.display='none'; }
 
// ════════════════════════════════════════
//  SHAPES
// ════════════════════════════════════════
function thaw(){
  const del=[];
  for(const k in frozen){frozen[k]--;if(frozen[k]<=0)del.push(k);}
  del.forEach(k=>delete frozen[k]);
}
 
function genShapes(){
  thaw();
  const area=$('shapes-area'); area.innerHTML=''; shapes=[];
  for(let i=0;i<3;i++){
    const base=cfg.sh[Math.floor(Math.random()*cfg.sh.length)];
    const fr=getFruit();
    let sp=null;
    if(SET.special && Math.random()<cfg.sc){
      // Assign special based on shape orientation
      const spanC=Math.max(...base.c.map(c=>c[0]))+1; // width in cols
      const spanR=Math.max(...base.c.map(c=>c[1]))+1; // height in rows
      const r=Math.random();
      if(spanR>spanC && r<0.5) sp='lightV';       // tall shape → vertical lightning
      else if(spanC>spanR && r<0.5) sp='lightH';  // wide shape → horizontal lightning
      else if(r<0.25) sp='bomb';
      else sp='ice';
    }
    shapes.push({cells:[...base.c],fr,sp,used:false,el:null});
  }
  const slotW=Math.floor((Math.min(window.innerWidth,480)-24-7*2)/3);
  const cs=Math.max(13,Math.floor(slotW/5.5)), fs=Math.max(9,cs-4);
  shapes.forEach((s,i)=>{
    const slot=document.createElement('div');
    slot.className='shape-slot'; slot.dataset.idx=i;
    if(s.sp){const b=document.createElement('div');b.className='sp-badge';b.textContent=SPEC[s.sp];slot.appendChild(b);}
    const maxC=Math.max(...s.cells.map(c=>c[0]));
    const maxR=Math.max(...s.cells.map(c=>c[1]));
    const sg=document.createElement('div'); sg.className='sgrid';
    sg.style.cssText=`display:grid;grid-template-columns:repeat(${maxC+1},${cs}px);gap:3px;`;
    for(let r=0;r<=maxR;r++) for(let c=0;c<=maxC;c++){
      const sc=document.createElement('div');
      const has=s.cells.some(([cc,rr])=>cc===c&&rr===r);
      sc.className='sc'+(has?'':' empty');
      sc.style.cssText=`width:${cs}px;height:${cs}px;font-size:${fs}px;`;
      if(has){sc.textContent=s.sp?SPEC[s.sp]:s.fr;sc.style.background='rgba(255,255,255,.13)';sc.style.borderRadius='4px';}
      sg.appendChild(sc);
    }
    slot.appendChild(sg);
    slot.addEventListener('touchstart',e=>{
      if(s.used)return;
      // NON fare preventDefault qui — lascia che il documento gestisca
      // Segna solo quale shape stiamo per trascinare
      touchPendingIdx=i;
      touchPendingX=e.touches[0].clientX;
      touchPendingY=e.touches[0].clientY;
    },{passive:true});
    slot.addEventListener('click',()=>{ if(s.used||dragShape)return; pickShape(i); });
    area.appendChild(slot); s.el=slot;
  });
  renderGrid();
}
 
function pickShape(i){
  if(shapes[i].used)return;
  shapes.forEach((s,j)=>{ if(s.el) s.el.classList.toggle('selected',j===i); });
  sel=shapes[i];
}
 
// ════════════════════════════════════════
//  DRAG — Block Blast style
//  Il ghost appare sopra il dito, centrato sulla forma.
//  La griglia snappa alla cella griglia più vicina al
//  centro geometrico del ghost (non all'ancora del dito).
// ════════════════════════════════════════
 
// Offset verticale fisso: il ghost galleggia sopra il dito
const LIFT_PX = ()=> calcCS() * 1.6;
 
// Centro geometrico della shape (in celle, float)
function shapeCenterCR(shape){
  const cs = shape.cells;
  const cx = cs.reduce((s,[c])=>s+c,0)/cs.length;
  const cr = cs.reduce((s,[,r])=>s+r,0)/cs.length;
  return [cr, cx]; // [centerRow, centerCol]
}
 
function startDrag(idx, cx, cy){
  if(shapes[idx].used) return;
  dragShape = shapes[idx]; sel = dragShape;
  shapes.forEach((s,j)=>{ if(s.el) s.el.classList.toggle('selected', j===idx); });
  shapes[idx].el.classList.add('dragging-source');
  // Ancora = centro geometrico della forma
  const [cr,cc] = shapeCenterCR(dragShape);
  dragAnchorR = cr; dragAnchorC = cc;
  buildGhost(dragShape);
  positionGhost(cx, cy);
  dragPreviewR = -1; dragPreviewC = -1;
  // Mostra subito preview nella posizione iniziale
  updateDragPreview(cx, cy);
}
 
// Posiziona ghost centrato sulla forma, sollevato sopra il dito
function positionGhost(cx, cy){
  const cs = calcCS();
  const cellSzG = Math.max(16, Math.floor(cs * 0.85));
  const gap = 2;
  const maxC = Math.max(...dragShape.cells.map(c=>c[0]));
  const maxR = Math.max(...dragShape.cells.map(c=>c[1]));
  // Dimensione totale del ghost
  const ghostW = (maxC+1)*(cellSzG+gap) - gap;
  const ghostH = (maxR+1)*(cellSzG+gap) - gap;
  // Centro geometrico della forma in pixel nel ghost
  const [cr,cc] = shapeCenterCR(dragShape);
  const centerXinGhost = cc*(cellSzG+gap) + cellSzG/2;
  const centerYinGhost = cr*(cellSzG+gap) + cellSzG/2;
  const ghost = $('drag-ghost');
  // Posiziona così: centro forma del ghost = posizione dito, poi alza
  ghost.style.left = (cx - centerXinGhost - 8) + 'px'; // -8 per padding ghost
  ghost.style.top  = (cy - centerYinGhost - 8 - LIFT_PX()) + 'px';
  ghost.style.transform = 'none';
}
 
// Calcola quale cella top-left corrisponde al dito
// Usa il centro geometrico del ghost per trovare la cella griglia
function fingerToGridRC(cx, cy){
  const cs = calcCS();
  const liftY = cy - LIFT_PX();
  // Punto del centro geometrico del ghost
  const [cr,cc] = shapeCenterCR(dragShape);
  const ghostCX = cx;
  const ghostCY = liftY;
  // Trova la cella griglia sotto il centro del ghost
  const gridEl = document.getElementById('grid');
  const gridRect = gridEl.getBoundingClientRect();
  const relX = ghostCX - gridRect.left;
  const relY = ghostCY - gridRect.top;
  const cellStep = cs + 3; // cellSize + gap
  const centerGridC = Math.round((relX - cs/2) / cellStep);
  const centerGridR = Math.round((relY - cs/2) / cellStep);
  // Top-left della forma = centro griglia - ancora centro
  const topLeftR = Math.round(centerGridR - cr);
  const topLeftC = Math.round(centerGridC - cc);
  return [topLeftR, topLeftC];
}
 
function updateDragPreview(cx, cy){
  if(!dragShape) return;
  const [row, col] = fingerToGridRC(cx, cy);
  if(row !== dragPreviewR || col !== dragPreviewC){
    dragPreviewR = row; dragPreviewC = col;
    previewAt(row, col);
  }
}
 
function endDrag(cx, cy){
  hideGhost();
  if(dragShape){
    const [row, col] = fingerToGridRC(cx, cy);
    if(canPlace(row, col, dragShape)) doPlace(row, col);
    else clearHL();
    if(dragShape && dragShape.el) dragShape.el.classList.remove('dragging-source');
    dragShape = null;
  }
}
 
// ── GHOST builder aggiornato con celle più grandi ──
function buildGhost(shape){
  const gg=$('ghost-grid'); gg.innerHTML='';
  const cs=Math.max(18, Math.floor(calcCS()*0.85)), fs=Math.max(11,cs-5);
  const maxC=Math.max(...shape.cells.map(c=>c[0]));
  const maxR=Math.max(...shape.cells.map(c=>c[1]));
  gg.style.cssText=`display:grid;grid-template-columns:repeat(${maxC+1},${cs}px);gap:2px;`;
  for(let r=0;r<=maxR;r++) for(let c=0;c<=maxC;c++){
    const sc=document.createElement('div');
    const has=shape.cells.some(([cc,rr])=>cc===c&&rr===r);
    sc.className='sc'+(has?'':' empty');
    sc.style.cssText=`width:${cs}px;height:${cs}px;font-size:${fs}px;`;
    if(has){sc.textContent=shape.sp?SPEC[shape.sp]:shape.fr;sc.style.background='rgba(255,255,255,.22)';sc.style.borderRadius='5px';}
    gg.appendChild(sc);
  }
  $('drag-ghost').style.display='block';
}
 
// ── MOUSE (desktop) ──
document.addEventListener('mousedown',e=>{
  const slot=e.target.closest('.shape-slot');
  if(slot){
    const idx=+slot.dataset.idx;
    if(idx>=0&&idx<shapes.length&&!shapes[idx].used){ mouseDown=true; startDrag(idx,e.clientX,e.clientY); }
  }
});
document.addEventListener('mousemove',e=>{
  if(mouseDown&&dragShape){
    positionGhost(e.clientX,e.clientY);
    updateDragPreview(e.clientX,e.clientY);
  }
});
document.addEventListener('mouseup',e=>{
  if(mouseDown&&dragShape){
    mouseDown=false;
    endDrag(e.clientX,e.clientY);
  }
  mouseDown=false;
});
 
// ── TOUCH GLOBALE ──
document.addEventListener('touchmove',e=>{
  const t=e.touches[0];
  if(!dragShape && touchPendingIdx>=0){
    const dx=t.clientX-touchPendingX, dy=t.clientY-touchPendingY;
    if(Math.sqrt(dx*dx+dy*dy)>DRAG_THRESHOLD){
      startDrag(touchPendingIdx, touchPendingX, touchPendingY);
      touchPendingIdx=-1;
    }
  }
  if(!dragShape) return;
  e.preventDefault();
  positionGhost(t.clientX, t.clientY);
  updateDragPreview(t.clientX, t.clientY);
},{passive:false});
 
document.addEventListener('touchend',e=>{
  touchPendingIdx=-1;
  if(!dragShape) return;
  e.preventDefault();
  const t=e.changedTouches[0];
  endDrag(t.clientX, t.clientY);
},{passive:false});
 
document.addEventListener('touchcancel',()=>{
  touchPendingIdx=-1;
  if(dragShape){
    hideGhost(); clearHL();
    if(dragShape.el) dragShape.el.classList.remove('dragging-source','selected');
    dragShape=null; sel=null;
  }
});
 
// ════════════════════════════════════════
//  PLACEMENT
// ════════════════════════════════════════
function getPc(row,col,s){ return s.cells.map(([c,r])=>[row+r,col+c]); }
function canPlace(row,col,s){ return getPc(row,col,s).every(([r,c])=>r>=0&&r<GS&&c>=0&&c<GS&&!grid[r][c]&&!frozen[r+','+c]); }
 
function previewAt(row,col){
  clearHL(); if(!sel)return;
  const sp=sel.sp;
  const cells=getPc(row,col,sel);
  const ok=cells.every(([r,c])=>r>=0&&r<GS&&c>=0&&c<GS&&!grid[r][c]&&!frozen[r+','+c]);
 
  // For specials: show effect zone preview
  if(sp==='bomb' && ok){
    // Show 5x5 blast zone
    const cx=row, cc2=col;
    cells.forEach(([r,c])=>{ if(r>=0&&r<GS&&c>=0&&c<GS){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el)el.classList.add('highlight');} });
    for(let r=cx-2;r<=cx+2;r++) for(let c=cc2-2;c<=cc2+2;c++){
      if(r>=0&&r<GS&&c>=0&&c<GS){
        const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
        if(el&&!el.classList.contains('highlight')) el.classList.add('bomb-zone');
      }
    }
    return;
  }
  if(sp==='lightH' && ok){
    // Show all rows the shape touches
    const touchedRows=new Set(cells.map(([r])=>r));
    touchedRows.forEach(r=>{ for(let c=0;c<GS;c++){ const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`); if(el)el.classList.add('line-complete'); } });
    return;
  }
  if(sp==='lightV' && ok){
    // Show all cols the shape touches
    const touchedCols=new Set(cells.map(([,c])=>c));
    touchedCols.forEach(c=>{ for(let r=0;r<GS;r++){ const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`); if(el)el.classList.add('line-complete'); } });
    return;
  }
  if(sp==='ice' && ok){
    cells.forEach(([r,c])=>{ const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el)el.classList.add('highlight'); });
    // Show freeze zone
    const touchedRows=new Set(cells.map(([r])=>r));
    const touchedCols=new Set(cells.map(([,c])=>c));
    touchedRows.forEach(r=>{ for(let c=0;c<GS;c++){ const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el&&!el.classList.contains('highlight'))el.classList.add('line-ready'); } });
    touchedCols.forEach(c=>{ for(let r=0;r<GS;r++){ const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el&&!el.classList.contains('highlight'))el.classList.add('line-ready'); } });
    return;
  }
 
  // Normal shape highlight
  cells.forEach(([r,c])=>{
    if(r>=0&&r<GS&&c>=0&&c<GS){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el)el.classList.add(ok?'highlight':'invalid');}
  });
  if(!ok) return;
  // Simulate placing and find which rows/cols would complete
  const placedSet=new Set(cells.map(([r,c])=>r+','+c));
  const completedRows=new Set(), completedCols=new Set();
  for(let r=0;r<GS;r++){
    let full=true;
    for(let c=0;c<GS;c++){ if(!grid[r][c]&&!placedSet.has(r+','+c)){full=false;break;} }
    if(full) completedRows.add(r);
  }
  for(let c=0;c<GS;c++){
    let full=true;
    for(let r=0;r<GS;r++){ if(!grid[r][c]&&!placedSet.has(r+','+c)){full=false;break;} }
    if(full) completedCols.add(c);
  }
  // Near-complete yellow hint
  for(let r=0;r<GS;r++){
    if(completedRows.has(r)) continue;
    let filled=0;
    for(let c=0;c<GS;c++) if(grid[r][c]||placedSet.has(r+','+c)) filled++;
    if(filled>=GS-1){ for(let c=0;c<GS;c++){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el&&!el.classList.contains('highlight'))el.classList.add('line-ready');} }
  }
  for(let c=0;c<GS;c++){
    if(completedCols.has(c)) continue;
    let filled=0;
    for(let r=0;r<GS;r++) if(grid[r][c]||placedSet.has(r+','+c)) filled++;
    if(filled>=GS-1){ for(let r=0;r<GS;r++){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el&&!el.classList.contains('highlight'))el.classList.add('line-ready');} }
  }
  completedRows.forEach(r=>{ for(let c=0;c<GS;c++){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el){el.classList.remove('highlight','line-ready');el.classList.add('line-complete');}} });
  completedCols.forEach(c=>{ for(let r=0;r<GS;r++){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el){el.classList.remove('highlight','line-ready');el.classList.add('line-complete');}} });
}
function clearHL(){ document.querySelectorAll('.cell.highlight,.cell.invalid,.cell.line-ready,.cell.line-complete,.cell.bomb-zone').forEach(e=>e.classList.remove('highlight','invalid','line-ready','line-complete','bomb-zone')); }
 
function doPlace(row,col){
  const shape=dragShape||sel;
  if(!shape||!canPlace(row,col,shape))return;
  const sp=shape.sp;
  const blockCount=shape.cells.length;
  const placedCells=getPc(row,col,shape);
 
  if(sp==='bomb'){
    // 5x5 blast centered on placement point, clears everything
    trackStat('useBomb',1);
    showFloat('💣 BOOM!',row,col);
    let cleared=0;
    for(let r=row-2;r<=row+2;r++) for(let c=col-2;c<=col+2;c++){
      if(r>=0&&r<GS&&c>=0&&c<GS){
        if(grid[r][c]) cleared++;
        grid[r][c]=null;
        delete frozen[r+','+c];
        if(SET.anim){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el)el.classList.add('clearing');}
      }
    }
    score += 150 + cleared*8;
 
  } else if(sp==='lightH'){
    // Clear ALL rows touched by the shape
    trackStat('useLH',1);
    const touchedRows=[...new Set(placedCells.map(([r])=>r))];
    showFloat(`⚡ x${touchedRows.length} RIGHE!`,row,col);
    touchedRows.forEach(r=>{
      for(let c=0;c<GS;c++){
        grid[r][c]=null;
        if(SET.anim){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el)el.classList.add('clearing');}
      }
      lines++; updMission(); trackStat('lines',1);
    });
    score += 120*touchedRows.length;
 
  } else if(sp==='lightV'){
    // Clear ALL columns touched by the shape
    trackStat('useLV',1);
    const touchedCols=[...new Set(placedCells.map(([,c])=>c))];
    showFloat(`🌩️ x${touchedCols.length} COL!`,row,col);
    touchedCols.forEach(c=>{
      for(let r=0;r<GS;r++){
        grid[r][c]=null;
        if(SET.anim){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el)el.classList.add('clearing');}
      }
      lines++; updMission(); trackStat('lines',1);
    });
    score += 120*touchedCols.length;
 
  } else if(sp==='ice'){
    // Place the blocks, then freeze the entire row AND column for each placed cell
    trackStat('useIce',1);
    placedCells.forEach(([r,c])=>{grid[r][c]=shape.fr;});
    showFloat('❄️ FREEZE!',row,col);
    const touchedRows=new Set(placedCells.map(([r])=>r));
    const touchedCols=new Set(placedCells.map(([,c])=>c));
    // Freeze cross pattern (row + col of shape)
    touchedRows.forEach(r=>{
      for(let c=0;c<GS;c++){
        if(!grid[r][c]&&!placedCells.some(([pr,pc])=>pr===r&&pc===c)){
          frozen[r+','+c]=2;
          const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
          if(el){el.classList.add('frozen');if(SET.anim){el.classList.add('freeze-anim');setTimeout(()=>el.classList.remove('freeze-anim'),500);}}
        }
      }
    });
    touchedCols.forEach(c=>{
      for(let r=0;r<GS;r++){
        if(!grid[r][c]&&!placedCells.some(([pr,pc])=>pr===r&&pc===c)){
          frozen[r+','+c]=2;
          const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
          if(el){el.classList.add('frozen');if(SET.anim){el.classList.add('freeze-anim');setTimeout(()=>el.classList.remove('freeze-anim'),500);}}
        }
      }
    });
    score += 20 + blockCount*3;
    trackStat('placed',blockCount); trackStat('bigShape',blockCount);
 
  } else {
    // Normal placement
    placedCells.forEach(([r,c])=>{grid[r][c]=shape.fr;});
    score+=blockCount;
    trackStat('placed',blockCount); trackStat('bigShape',blockCount);
    showFloat('+'+blockCount,row,col);
    if(SET.anim) placedCells.forEach(([r,c])=>{
      const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
      if(el){el.classList.add('just-placed');setTimeout(()=>el.classList.remove('just-placed'),260);}
    });
  }
 
  shape.used=true;
  if(shape.el){shape.el.classList.add('used');shape.el.classList.remove('selected','dragging-source');}
  sel=null; dragShape=null; clearHL(); hideGhost();
  // Decrement frozen timers
  Object.keys(frozen).forEach(k=>{frozen[k]--;if(frozen[k]<=0)delete frozen[k];});
 
  setTimeout(()=>{
    checkLines(); renderGrid(); updScore();
    if(shapes.every(s=>s.used)){ trackStat('turns',1); setTimeout(genShapes,320); }
    else checkGO();
  }, animD());
}
 
// ════════════════════════════════════════
//  COMBO + GRACE
// ════════════════════════════════════════
function calcGrace(){
  let hot=0;
  for(let r=0;r<GS;r++) if(grid[r].filter(c=>c!==null).length>=GS-2) hot++;
  for(let c=0;c<GS;c++) if(grid.map(r=>r[c]).filter(v=>v!==null).length>=GS-2) hot++;
  if(hot>=6) return 4; if(hot>=4) return 3; if(hot>=2) return 2; if(hot>=1) return 1;
  return 0;
}
function updGraceUI(){
  const cg=$('combo-grace'), lbl=$('combo-lbl');
  if(combo===0&&comboGrace===0){ cg.style.display='none'; lbl.textContent=''; return; }
  if(combo>=2){ cg.style.display='none'; return; }
  if(comboGrace>0){
    cg.style.display='flex';
    lbl.textContent='🔥 COMBO!';
    lbl.style.color=comboGrace===1?'#e74c3c':'#ff9f43';
    for(let i=0;i<4;i++){
      const d=$('gd'+i); if(!d)continue;
      d.className='grace-dot'+(i<comboGrace?' lit'+(comboGrace===1?' low':''):'');
    }
  }
}
 
// ════════════════════════════════════════
//  LINES
// ════════════════════════════════════════
function checkLines(){
  const toC=[];
  for(let r=0;r<GS;r++) if(grid[r].every(c=>c!==null)) toC.push({t:'row',i:r});
  for(let c=0;c<GS;c++) if(grid.every(r=>r[c]!==null)) toC.push({t:'col',i:c});
 
  if(!toC.length){
    if(combo>0){
      if(comboGrace>0){ comboGrace--; updGraceUI(); if(comboGrace===0) setTimeout(()=>{combo=0;comboGrace=0;updGraceUI();},300); }
      else { const g=calcGrace(); if(g>0){comboGrace=g;updGraceUI();}else{combo=0;comboGrace=0;updGraceUI();} }
    }
    return;
  }
 
  combo++; comboGrace=0;
  let ls=0;
  toC.forEach(({t,i})=>{
    ls+=100*(combo>1?combo:1); lines++;
    trackStat('lines',1);
    if(t==='row'){for(let c=0;c<GS;c++){grid[i][c]=null;if(SET.anim){const el=document.querySelector(`.cell[data-row="${i}"][data-col="${c}"]`);if(el)el.classList.add('clearing');}}}
    else{for(let r=0;r<GS;r++){grid[r][i]=null;if(SET.anim){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${i}"]`);if(el)el.classList.add('clearing');}}}
  });
  if(toC.length>=2) runStats.multiLine=Math.max(runStats.multiLine,toC.length);
  trackStat('combo',combo);
  score+=ls; updScore(); updMission();
  if(combo>=2){
    $('combo-lbl').textContent=`🔥 COMBO x${combo}!`;
    $('combo-lbl').style.color='#ff6b6b';
    showFloat(`+${ls} x${combo}!`,Math.floor(GS/2),Math.floor(GS/2));
  } else {
    $('combo-lbl').textContent='🔥 COMBO!';
    $('combo-lbl').style.color='#ff9f43';
    showFloat(`+${ls}`,Math.floor(GS/2),Math.floor(GS/2)+1);
  }
  updGraceUI();
  setTimeout(()=>{document.querySelectorAll('.cell.clearing').forEach(e=>e.classList.remove('clearing'));renderGrid();},animD());
}
 
// ════════════════════════════════════════
//  SCORE / MISSION
// ════════════════════════════════════════
function updScore(){
  $('score').textContent=score.toLocaleString();
  const b=getBest(diff);
  if(score>b){setBest(diff,score);$('best-score').textContent=score.toLocaleString();}
  // track score objective
  if(activeObj&&activeObj.type==='score') checkObjProgress();
  else updObjMini();
}
function updMission(){
  const p=$('mission-prog');
  p.textContent=Math.min(lines,mission)+'/'+mission;
  if(lines>=mission){
    p.style.color='var(--green)'; score+=500;
    mission+=cfg.ms; showFloat('🎯 +500!',1,2);
    updScore();
    setTimeout(()=>{p.style.color='';updMission();},1600);
  }
}
function showFloat(txt,row,col){
  const cell=document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
  const fs=$('fscore');
  const rect=cell?cell.getBoundingClientRect():{left:100,top:200};
  fs.style.left=(rect.left+8)+'px'; fs.style.top=(rect.top-8)+'px';
  fs.style.opacity='1'; fs.style.transform='translateY(0)';
  fs.textContent=txt;
  clearTimeout(fs._t);
  fs._t=setTimeout(()=>{fs.style.opacity='0';fs.style.transform='translateY(-40px)';},90);
}
 
// ════════════════════════════════════════
//  GAME OVER
// ════════════════════════════════════════
function checkGO(){
  const avail=shapes.filter(s=>!s.used);
  if(!avail.length)return;
  const ok=avail.some(s=>{for(let r=0;r<GS;r++)for(let c=0;c<GS;c++)if(canPlace(r,c,s))return true;return false;});
  if(!ok) setTimeout(triggerGO,600);
}
function triggerGO(){
  saveRunStats();
  const best=getBest(diff);
  $('go-final').textContent=score.toLocaleString();
  const gd=$('go-diff-v'); gd.textContent=cfg.lbl; gd.style.color=cfg.col;
  $('go-best-v').textContent=best.toLocaleString();
  $('go-lines-v').textContent=lines;
  $('go-new-rec').style.display=(score>=best&&score>0)?'block':'none';
  $('game-screen').style.display='none';
  $('go-screen').style.display='flex';
  $('go-screen').classList.add('fade-in');
}
 
// ════════════════════════════════════════
//  EVENTS
// ════════════════════════════════════════
window.addEventListener('resize',()=>renderGrid());
$('menu-btn').addEventListener('click',()=>{ dragShape=null;hideGhost();location.href='index.html'; });
$('play-again-btn').addEventListener('click',startGame);
$('go-menu-btn').addEventListener('click',()=>{ location.href='index.html'; });
 
// Boot
startGame();
</script>
