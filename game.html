<style>
/* ── Game layout ── */
#game-screen{gap:0;padding-top:calc(var(--sat) + 6px);justify-content:space-between;min-height:100%;padding-bottom:calc(var(--sab) + 6px);}
.g-header{display:flex;align-items:center;width:100%;justify-content:space-between;gap:8px;}
.g-logo{font-family:'Fredoka One',cursive;font-size:19px;color:#fff;}
.g-left{display:flex;gap:6px;}
#score-area{display:flex;flex-direction:column;align-items:center;
  background:var(--glass);border-radius:12px;padding:5px 13px;
  border:1px solid var(--gb);min-width:78px;}
.slbl{font-size:9px;color:rgba(255,255,255,.42);letter-spacing:1px;text-transform:uppercase;}
#score{font-family:'Fredoka One',cursive;font-size:clamp(20px,6vw,26px);color:var(--gold);line-height:1;}
#combo-lbl{font-size:10px;color:#ff6b6b;font-weight:900;min-height:13px;}
#combo-grace{display:none;align-items:center;gap:3px;}
.grace-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .3s,transform .2s;}
.grace-dot.lit{background:#ff9f43;transform:scale(1.2);}
.grace-dot.low{background:#e74c3c;}
.g-icon-btn{background:var(--glass);border:1px solid var(--gb);color:#fff;
  border-radius:10px;cursor:pointer;font-size:18px;
  min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;}
.g-icon-btn:active{background:rgba(255,255,255,.18);}
.g-info-row{display:flex;gap:6px;align-items:stretch;width:100%;}
#mission-bar{background:var(--glass);border-radius:10px;padding:6px 12px;
  font-size:12px;color:rgba(255,255,255,.75);border:1px solid var(--gb);
  flex:1;display:flex;align-items:center;gap:5px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06);}
#mission-prog{color:var(--gold);font-weight:900;}
#diff-pill{font-size:11px;font-weight:900;border-radius:10px;padding:0 11px;
  display:flex;align-items:center;border:1px solid;white-space:nowrap;}
.powerup-bar{
  display:flex;align-items:center;gap:5px;width:100%;justify-content:center;
}
.pu-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(255,255,255,.09);border:1.5px solid rgba(255,255,255,.16);
  border-radius:12px;cursor:pointer;color:#fff;
  min-width:40px;height:44px;font-size:18px;line-height:1;
  position:relative;transition:background .15s,transform .12s,box-shadow .15s;
  padding:0 2px;gap:1px;
  box-shadow:0 2px 10px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.07);
}
.pu-btn:active{transform:scale(.9);}
.pu-btn.active-pu{
  border-color:var(--gold);background:rgba(255,215,0,.14);
  box-shadow:0 0 14px rgba(255,215,0,.35);
  transform:scale(1.08);
}
.pu-btn.empty-pu{ opacity:.35; cursor:default; }
.pu-count{
  font-size:9px;font-weight:900;font-family:'Nunito',sans-serif;
  color:rgba(255,255,255,.7);line-height:1;
}
.pu-btn.active-pu .pu-count{ color:var(--gold); }
.hint-pu{ border-color:rgba(100,200,255,.28);background:rgba(100,200,255,.07); }
.hint-pu.active-pu{ border-color:rgba(100,200,255,.8);background:rgba(100,200,255,.18);box-shadow:0 0 14px rgba(100,200,255,.35); }
.best-pill{
  margin-left:auto;font-size:11px;color:rgba(255,255,255,.55);
  white-space:nowrap;padding:0 4px;
}
.best-pill b{color:var(--gold);font-weight:900;}
 
 
 
/* Grid */
#grid-wrap{background:rgba(255,255,255,.04);border-radius:16px;
  padding:6px;border:2px solid rgba(255,255,255,.12);
  box-shadow:0 0 40px rgba(80,30,180,.22),0 4px 20px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.06);}
#grid{display:grid;}
.cell{border-radius:6px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  transition:background .06s,border-color .06s;}
.cell.filled{background:rgba(255,255,255,.1);}
.cell.highlight{
  background:rgba(255,230,30,.38) !important;
  border-color:rgba(255,220,0,.85) !important;
  box-shadow:0 0 10px rgba(255,220,0,.5), inset 0 0 8px rgba(255,220,0,.25) !important;
  transform:scale(1.07);z-index:2;transition:background .06s,transform .06s;}
.cell.invalid{background:rgba(255,50,50,.28) !important;border-color:rgba(255,100,100,.7) !important;
  box-shadow:0 0 8px rgba(255,60,60,.3) !important;}
.cell.clearing{animation:explode .45s cubic-bezier(.36,.07,.19,.97) forwards;}
@keyframes explode{
  0%  {transform:scale(1);   opacity:1;  filter:brightness(1);}
  20% {transform:scale(1.45);opacity:1;  filter:brightness(2.5) saturate(2);}
  45% {transform:scale(1.1); opacity:.7; filter:brightness(1.8);}
  100%{transform:scale(0) rotate(20deg);opacity:0; filter:brightness(3);}
}
.cell.just-placed{animation:land .2s cubic-bezier(.34,1.56,.64,1);}
@keyframes land{from{transform:scale(.55);filter:brightness(1.8)}to{transform:scale(1);filter:brightness(1)}}
.cell.frozen{background:rgba(130,210,255,.15)!important;border-color:rgba(130,220,255,.48)!important;cursor:not-allowed;}
.cell.frozen::after{content:'❄';position:absolute;font-size:8px;bottom:1px;right:1px;opacity:.5;line-height:1;}
.cell.freeze-anim{animation:freeze .44s cubic-bezier(.34,1.56,.64,1);}
@keyframes freeze{0%{background:rgba(180,240,255,.5);transform:scale(1.1)}100%{background:rgba(130,210,255,.15);transform:scale(1)}}
 
/* Shapes */
#shapes-area{display:flex;gap:7px;justify-content:center;width:100%;flex-shrink:0;}
.shape-slot{touch-action:manipulation;background:rgba(255,255,255,.07);border-radius:13px;
  border:2px solid rgba(255,255,255,.13);
  flex:1;max-width:32%;min-height:76px;
  display:flex;align-items:center;justify-content:center;
  cursor:grab;position:relative;padding:9px 5px;
  box-shadow:0 2px 10px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.08);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,border-color .2s,background .2s;}
.shape-slot.selected{border-color:var(--gold);
  box-shadow:0 0 18px rgba(255,215,0,.36),0 4px 16px rgba(255,215,0,.16);
  transform:translateY(-5px) scale(1.06);background:rgba(255,215,0,.07);}
.shape-slot.dragging-source{opacity:.35;transform:scale(.95)!important;}
.shape-slot.used{opacity:.12;cursor:default;transform:none!important;box-shadow:none!important;border-color:rgba(255,255,255,.06)!important;}
.sgrid{display:grid;pointer-events:none;}
.sc{border-radius:4px;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.sc.empty{background:transparent!important;}
.sp-badge{position:absolute;top:4px;right:4px;font-size:10px;
  background:rgba(255,85,35,.8);color:#fff;border-radius:6px;padding:1px 5px;font-weight:900;}
 
/* Drag ghost */
#drag-ghost{
  position:fixed;pointer-events:none;z-index:1000;display:none;opacity:.9;
  background:rgba(20,10,40,.82);border-radius:12px;padding:8px;
  border:2px solid rgba(255,215,0,.6);
  box-shadow:0 0 24px rgba(255,215,0,.35),0 4px 16px rgba(0,0,0,.5);
  will-change:left,top;
}
 
/* Banner AdSense fisso in basso */
#ad-banner-wrap{
  position:fixed;
  bottom:0; left:0; right:0;
  z-index:900;
  display:flex; justify-content:center; align-items:flex-end;
  background:rgba(10,8,32,.92);
  border-top:1px solid rgba(255,255,255,.08);
  padding-bottom:env(safe-area-inset-bottom,0px);
  min-height:60px;
}
#ad-banner-wrap ins{
  display:block;
  width:100%;
  max-width:480px;
}
/* Spazio sotto il gioco per non coprire le forme */
#game-screen{ padding-bottom:calc(var(--sab) + 66px) !important; }
 
/* Overlay rewarded video */
#ad-rewarded-overlay{
  display:none;
  position:fixed;inset:0;z-index:9999;
  background:rgba(8,4,26,.97);
  flex-direction:column;align-items:center;justify-content:center;gap:18px;
  padding:24px;
}
#ad-rewarded-overlay.visible{ display:flex; }
.aro-title{
  font-family:'Fredoka One',cursive;
  font-size:clamp(26px,8vw,34px);color:#fff;
  text-align:center;line-height:1.2;
}
.aro-sub{
  font-size:13px;color:rgba(255,255,255,.55);
  text-align:center;line-height:1.5;
}
.aro-reward-preview{
  display:flex;gap:10px;justify-content:center;align-items:center;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:16px;padding:12px 20px;
}
.aro-piece{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  font-size:11px;color:rgba(255,255,255,.55);
}
.aro-piece-icon{
  font-size:26px;
  background:rgba(255,255,255,.1);border-radius:10px;
  padding:6px 10px;border:1px solid rgba(255,255,255,.15);
}
.aro-ad-container{
  width:100%;max-width:360px;min-height:250px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  border-radius:14px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.aro-skip-row{display:flex;gap:10px;width:100%;max-width:360px;}
#aro-btn-watch{
  flex:1;background:linear-gradient(135deg,#27ae60,#1e8449);
  color:#fff;border:none;border-radius:50px;
  padding:14px 0;font-size:17px;font-family:'Fredoka One',cursive;
  cursor:pointer;letter-spacing:.5px;
  box-shadow:0 6px 20px rgba(39,174,96,.4);
}
#aro-btn-watch:active{transform:scale(.97);}
#aro-btn-skip{
  background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);
  border:1px solid rgba(255,255,255,.14);border-radius:50px;
  padding:14px 18px;font-size:13px;font-weight:700;
  font-family:'Nunito',sans-serif;cursor:pointer;
}
#aro-btn-skip:active{background:rgba(255,255,255,.15);}
#aro-countdown{
  font-size:11px;color:rgba(255,255,255,.35);
  text-align:center;min-height:16px;
}
 
/* Game over */
#go-screen{gap:14px;padding-top:calc(var(--sat) + 8px);padding-bottom:calc(var(--sab) + 12px);text-align:center;justify-content:center;min-height:100vh;min-height:100dvh;}
.go-emoji{font-size:clamp(54px,15vw,70px);animation:gbounce .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes gbounce{from{transform:scale(0) rotate(-10deg)}to{transform:scale(1) rotate(0)}}
.go-title{font-family:'Fredoka One',cursive;font-size:clamp(36px,11vw,48px);color:var(--gold);}
.go-score{font-family:'Fredoka One',cursive;font-size:clamp(50px,14vw,64px);color:#fff;}
#go-new-rec{background:linear-gradient(135deg,rgba(255,215,0,.18),rgba(255,150,0,.12));
  border:1px solid rgba(255,215,0,.4);border-radius:12px;
  padding:8px 24px;font-size:15px;font-weight:900;color:var(--gold);
  letter-spacing:1.5px;text-transform:uppercase;
  box-shadow:0 0 20px rgba(255,215,0,.25);
  animation:recPulse 1s ease-in-out infinite alternate;}
@keyframes recPulse{from{box-shadow:0 0 14px rgba(255,215,0,.2)}to{box-shadow:0 0 28px rgba(255,215,0,.5)}}
.go-cards{display:flex;gap:7px;width:100%;}
.go-card{flex:1;background:var(--glass);border:1px solid var(--gb);border-radius:13px;padding:11px 5px;text-align:center;}
.gc-lbl{font-size:10px;color:rgba(255,255,255,.42);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.gc-val{font-family:'Fredoka One',cursive;font-size:clamp(18px,5vw,22px);color:#fff;}
#play-again-btn{background:linear-gradient(135deg,#ff6b6b,#ff9f43);color:#fff;border:none;
  padding:clamp(13px,4vw,15px) 0;border-radius:50px;
  font-size:clamp(18px,5.5vw,22px);font-family:'Fredoka One',cursive;
  cursor:pointer;box-shadow:0 6px 20px rgba(255,107,107,.35);width:100%;max-width:300px;}
#play-again-btn:active{transform:scale(.96);}
#go-menu-btn{background:var(--glass);color:rgba(255,255,255,.62);
  border:1px solid var(--gb);padding:10px 0;border-radius:50px;
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:'Nunito',sans-serif;width:100%;max-width:300px;text-align:center;}
#go-menu-btn:active{background:rgba(255,255,255,.14);}
 
 
 
.cell.line-ready{background:rgba(255,180,0,.35) !important;border-color:rgba(255,190,0,.9) !important;box-shadow:0 0 10px rgba(255,180,0,.45), inset 0 0 6px rgba(255,200,0,.2) !important;transition:background .08s,border-color .08s;animation:lineReadyPulse .6s ease-in-out infinite alternate;}
@keyframes lineReadyPulse{from{box-shadow:0 0 6px rgba(255,180,0,.3)}to{box-shadow:0 0 16px rgba(255,200,0,.7), inset 0 0 8px rgba(255,200,0,.3)}}
.cell.line-complete{background:rgba(80,255,140,.38) !important;border-color:rgba(60,255,130,.9) !important;box-shadow:inset 0 0 10px rgba(80,255,140,.4), 0 0 12px rgba(80,255,140,.3) !important;transition:background .08s,border-color .08s;z-index:1;}
.cell.bomb-zone{background:rgba(255,80,80,.2);border-color:rgba(255,100,80,.55);transition:background .08s;}
.cell.bomb-preview{
  background:rgba(220,30,30,.32) !important;
  border-color:rgba(255,60,60,.95) !important;
  box-shadow:0 0 12px rgba(255,50,50,.55), inset 0 0 8px rgba(255,80,80,.25) !important;
  animation:bombPrevPulse .55s ease-in-out infinite alternate;
}
@keyframes bombPrevPulse{
  from{box-shadow:0 0 6px rgba(255,50,50,.3), inset 0 0 4px rgba(255,80,80,.15)}
  to{box-shadow:0 0 18px rgba(255,60,60,.8), inset 0 0 10px rgba(255,100,80,.4)}
}
.cell.ice-preview{
  background:rgba(80,190,255,.28) !important;
  border-color:rgba(100,210,255,.95) !important;
  box-shadow:0 0 12px rgba(80,200,255,.5), inset 0 0 8px rgba(130,220,255,.25) !important;
  animation:icePrevPulse .55s ease-in-out infinite alternate;
}
@keyframes icePrevPulse{
  from{box-shadow:0 0 6px rgba(80,200,255,.3), inset 0 0 4px rgba(130,220,255,.15)}
  to{box-shadow:0 0 18px rgba(80,220,255,.75), inset 0 0 10px rgba(160,230,255,.4)}
}
.cell.hint-shape{background:rgba(100,200,255,.22)!important;border-color:rgba(80,180,255,.7)!important;
  box-shadow:inset 0 0 8px rgba(80,200,255,.3);animation:hintPulse 0.8s ease-in-out infinite alternate;}
@keyframes hintPulse{from{box-shadow:inset 0 0 6px rgba(80,200,255,.2),0 0 8px rgba(80,200,255,.2)}to{box-shadow:inset 0 0 12px rgba(80,200,255,.5),0 0 16px rgba(80,200,255,.4)}}
#fscore{position:fixed;pointer-events:none;font-family:'Fredoka One',cursive;font-size:24px;
  color:var(--gold);text-shadow:0 0 14px rgba(255,215,0,.9),0 2px 0 rgba(0,0,0,.4);z-index:999;opacity:0;
  transition:opacity .5s,transform .7s;letter-spacing:.5px;}
/* Particle canvas overlay */
#particle-canvas{position:fixed;inset:0;pointer-events:none;z-index:998;}
</style>
 
<script>
if('serviceWorker' in navigator && location.protocol !== 'file:'){
  navigator.serviceWorker.register('./sw.js').then(reg => {
    reg.update();
    reg.addEventListener('updatefound', () => {
      const sw = reg.installing;
      sw.addEventListener('statechange', () => {
        if(sw.state === 'installed' && navigator.serviceWorker.controller){
          window.location.reload();
        }
      });
    });
  });
  // Ascolta il messaggio dal SW: nuovo deploy rilevato -> ricarica subito
  navigator.serviceWorker.addEventListener('message', e => {
    if(e.data && e.data.type === 'SW_UPDATED') window.location.reload();
  });
}
</script>

<body>
<canvas id="particle-canvas"></canvas>
<div id="app">
 
<!-- GAME -->
<div id="game-screen" class="page fade-in">
  <div class="g-header">
    <div class="g-left">
      <button class="g-icon-btn" id="menu-btn">🏠</button>
    </div>
    <div class="g-logo">🍉 FruitBlast</div>
    <div id="score-area">
      <div class="slbl">SCORE</div>
      <div id="score">0</div>
      <div id="combo-lbl"></div>
      <div id="combo-grace"><div class="grace-dot" id="gd0"></div><div class="grace-dot" id="gd1"></div><div class="grace-dot" id="gd2"></div></div>
    </div>
  </div>
  <div class="g-info-row">
    <div id="mission-bar">🎯 Linee: <span id="mission-prog">0/8</span></div>
    <div id="diff-pill"></div>
  </div>
  <div class="powerup-bar">
    <button class="pu-btn" id="pu-bomb"  data-sp="bomb">💣<span class="pu-count" id="stat-bomb">0</span></button>
    <button class="pu-btn" id="pu-lh"    data-sp="lightH">⚡<span class="pu-count" id="stat-lh">0</span></button>
    <button class="pu-btn" id="pu-lv"    data-sp="lightV">🌩️<span class="pu-count" id="stat-lv">0</span></button>
    <button class="pu-btn" id="pu-ice"   data-sp="ice">❄️<span class="pu-count" id="stat-ice">0</span></button>
    <button class="pu-btn hint-pu" id="pu-hint">💡<span class="pu-count" id="stat-hint">0</span></button>
    <div class="best-pill">🏆 <b id="best-score">0</b></div>
  </div>
 
  <div id="grid-wrap"><div id="grid"></div></div>
  <div id="shapes-area"></div>
</div>
 
<!-- GAME OVER -->
<div id="go-screen" class="page" style="display:none;">
  <div class="go-emoji">🍉💥</div>
  <div class="go-title">Game Over!</div>
  <div class="go-score" id="go-final">0</div>
  <div id="go-new-rec" style="display:none">🏆 Nuovo Record!</div>
  <div class="go-cards">
    <div class="go-card"><div class="gc-lbl">Difficoltà</div><div class="gc-val" id="go-diff-v">—</div></div>
    <div class="go-card"><div class="gc-lbl">Record</div><div class="gc-val" id="go-best-v">0</div></div>
    <div class="go-card"><div class="gc-lbl">Linee</div><div class="gc-val" id="go-lines-v">0</div></div>
  </div>
  <button id="play-again-btn">🔄 Rigioca</button>
  <button id="go-menu-btn">🏠 Menu principale</button>
</div>
 
</div><!-- #app -->
 
<!-- Banner AdSense fisso in fondo -->
<div id="ad-banner-wrap">
  <!-- Sostituisci data-ad-slot con il tuo Ad Slot ID banner 320x50 o Responsive -->
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-3954056972955412"
       data-ad-slot="XXXXXXXXXX"
       data-ad-format="banner"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
 
<!-- Overlay Rewarded Video (game over) -->
<div id="ad-rewarded-overlay">
  <div class="aro-title">💀 Game Over!<br>Vuoi rinascere?</div>
  <div class="aro-sub">Guarda un breve video e ricevi<br>3 pezzi speciali per continuare</div>
  <div class="aro-reward-preview">
    <div class="aro-piece"><div class="aro-piece-icon">💣</div>Bomba</div>
    <div class="aro-piece"><div class="aro-piece-icon">⚡</div>Fulmine</div>
    <div class="aro-piece"><div class="aro-piece-icon">🍉🍉</div>Forma x2</div>
  </div>
  <div class="aro-ad-container">
    <!-- Sostituisci data-ad-slot con il tuo Ad Slot ID rewarded/interstitial -->
    <ins class="adsbygoogle"
         style="display:block;width:100%;height:250px;"
         data-ad-client="ca-pub-3954056972955412"
         data-ad-slot="YYYYYYYYYY"
         data-ad-format="fluid"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>
  <div id="aro-countdown"></div>
  <div class="aro-skip-row">
    <button id="aro-btn-watch">✅ Ricevi i pezzi!</button>
    <button id="aro-btn-skip">✕ No grazie</button>
  </div>
</div>

<script src="data.js"></script>
<script>
// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
const $=id=>document.getElementById(id);
const diff = sessionStorage.getItem('fb_diff')||'easy';
const cfg  = DCFG[diff];
let SET    = getSettings();
 
// ── game state ──
let GS, grid, score, shapes, sel, combo, comboGrace, lines, mission, frozen;
let activeMulti = 1;
let dragShape=null, dragAnchorR=0, dragAnchorC=0, dragPreviewR=-1, dragPreviewC=-1;
let mouseDown=false;
let touchPendingIdx=-1, touchPendingX=0, touchPendingY=0;
const DRAG_THRESHOLD=8; // pixel di movimento minimo per iniziare drag
 
// ── per-run stats (tracked for objectives) ──
let runStats={};
function resetRunStats(){
  runStats={lines:0,score:0,combo:0,useBomb:0,useLH:0,useLV:0,useIce:0,
            placed:0,bigShape:0,multiLine:0,turns:0,pureLines:0};
}
 
// ── objective state ──
let objState, activeObj;
 
// ════════════════════════════════════════
//  OBJECTIVE HELPERS
// ════════════════════════════════════════
function loadObjState(){
  objState = getObjState(diff);
  const objs = OBJECTIVES[diff];
  const idx  = Math.min(objState.currentIdx||0, objs.length-1);
  activeObj  = objs[idx];
}
 
function getObjProgress(){
  if(!activeObj) return 0;
  const t = activeObj.type;
  if(t==='score')     return score;
  if(t==='combo')     return runStats.combo;
  if(t==='bigShape')  return runStats.bigShape;
  if(t==='multiLine') return runStats.multiLine;
  return runStats[t]||0;
}
 
function updObjMini(){ /* mini bar removed — objectives visible from menu only */ }
 
function trackStat(type, val){
  if(type==='lines')    { runStats.lines    +=val; }
  if(type==='useBomb')  { runStats.useBomb  +=1;   }
  if(type==='useLH')    { runStats.useLH    +=1;   }
  if(type==='useLV')    { runStats.useLV    +=1;   }
  if(type==='useIce')   { runStats.useIce   +=1;   }
  if(type==='placed')   { runStats.placed   +=val; }
  if(type==='turns')    { runStats.turns    +=1;   }
  if(type==='multiLine'&&val>runStats.multiLine) runStats.multiLine=val;
  if(type==='bigShape' &&val>runStats.bigShape)  runStats.bigShape=val;
  if(type==='combo'    &&val>runStats.combo)      runStats.combo=val;
  // score is always from global score variable
  checkObjProgress();
}
 
function checkObjProgress(){
  if(!activeObj) return;
  if((objState.completed||[]).includes(activeObj.id)) return;
  const prog = getObjProgress();
  updObjMini();
  if(prog >= activeObj.target) completeObjective();
}
 
function completeObjective(){
  if(!activeObj) return;
  if(!objState.completed) objState.completed=[];
  if(objState.completed.includes(activeObj.id)) return;
 
  objState.completed.push(activeObj.id);
  score += activeObj.reward;
  addBonusPoints(activeObj.reward); // accumulate in global bonus wallet
  updScore();
 
  // objective completed (toast removed)
 
  // advance to next objective
  const objs = OBJECTIVES[diff];
  const nextIdx = objState.currentIdx+1;
  if(nextIdx < objs.length){
    objState.currentIdx = nextIdx;
    activeObj = objs[nextIdx];
  } else {
    activeObj = null; // all done
  }
  saveObjState(diff, objState);
 
  // persist best stats for objectives page
  saveRunStats();
  updObjMini();
}
 
function saveRunStats(){
  let stored={};
  try{ const r=localStorage.getItem('fb_stats_'+diff); if(r) stored=JSON.parse(r); }catch(e){}
  const merged={};
 
  // Legge cum:true dal data.js per sapere quali stat sommare vs max
  const cumTypes = new Set();
  (OBJECTIVES[diff]||[]).forEach(o=>{ if(o.cum) cumTypes.add(o.type); });
 
  const keys=['lines','score','combo','useBomb','useLH','useLV','useIce','placed','bigShape','multiLine','turns'];
  keys.forEach(k=>{
    const cur = k==='score' ? score : (runStats[k]||0);
    merged[k] = cumTypes.has(k)
      ? (stored[k]||0) + cur          // cumulativo: somma
      : Math.max(stored[k]||0, cur);  // singola partita: massimo
  });
  localStorage.setItem('fb_stats_'+diff, JSON.stringify(merged));
}
 
// ════════════════════════════════════════
//  GAME INIT
// ════════════════════════════════════════
function startGame(){
  GS=cfg.gs;
  grid=Array.from({length:GS},()=>Array(GS).fill(null));
  frozen={}; score=0; combo=0; comboGrace=0; lines=0; mission=cfg.ms; sel=null; dragShape=null; activePowerup=null; rewardedUsedThisGame=false;
  resetRunStats();
  loadObjState();
 
  // Carica moltiplicatore attivo
  activeMulti = parseInt(localStorage.getItem('fb_active_multi')||'1');
 
  // Load purchased inventory
  loadInventory();
 
  const p=$('diff-pill');
  p.textContent=cfg.lbl;
  p.style.cssText=`font-size:11px;font-weight:900;border-radius:10px;padding:0 11px;display:flex;align-items:center;border:1px solid ${cfg.col};color:${cfg.col};background:${cfg.col}22;`;
 
  // Banner moltiplicatore attivo
  let _mb=$('multi-banner');
  if(!_mb){
    _mb=document.createElement('div'); _mb.id='multi-banner';
    _mb.style.cssText='width:100%;text-align:center;font-family:Fredoka One,cursive;font-size:12px;font-weight:900;color:var(--gold);background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.25);border-radius:10px;padding:4px 0;letter-spacing:.5px;';
    const gs=$('game-screen'); gs.insertBefore(_mb, gs.querySelector('.g-info-row').nextSibling);
  }
  _mb.style.display = activeMulti>1 ? 'block' : 'none';
  if(activeMulti>1) _mb.textContent = '✖️'+activeMulti+' MOLTIPLICATORE ATTIVO';
 
  updScore();
  $('best-score').textContent=getBest(diff).toLocaleString();
  updMission();
  updObjMini();
  loadGridTheme();
  renderGrid();
  genShapes();
 
  $('game-screen').style.display='flex';
  $('go-screen').style.display='none';
}
 
function animD(){ return SET.anim ? 160 : 0; }
function getFruit(){
  if(!SET.fruit) return '■';
  const activeSet = getActiveEmojiSet();
  const pool = (activeSet && activeSet.length) ? activeSet : FRUITS;
  return pool[Math.floor(Math.random()*pool.length)];
}
function getBlockBg(fr, alpha){
  // Load active color theme (array of hex strings, or null for default)
  let colorData = null;
  try { const raw=localStorage.getItem('fb_active_color'); if(raw) colorData=JSON.parse(raw); } catch(e){}
  if(!colorData || !colorData.length){
    // Default: white glass
    return alpha ? 'rgba(255,255,255,'+alpha+')' : 'rgba(255,255,255,.13)';
  }
  // Pick color from palette: use emoji char code to deterministically pick
  const code = fr ? fr.codePointAt(0) : 0;
  const hex = colorData[code % colorData.length];
  if(!hex || !hex.startsWith('#')){
    // Color might be rgba already (default theme)
    return hex || 'rgba(255,255,255,.13)';
  }
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  const a = alpha || '.5';
  return 'rgba('+r+','+g+','+b+','+a+')';
}
 
// ════════════════════════════════════════
//  GRID THEME (from shop)
// ════════════════════════════════════════
let _gridTheme = null;
function loadGridTheme(){
  try {
    const raw = localStorage.getItem('fb_grid_theme_data');
    _gridTheme = raw ? JSON.parse(raw) : null;
  } catch(e){ _gridTheme = null; }
  const wrap = $('grid-wrap');
  if(_gridTheme){
    wrap.style.background  = _gridTheme.bg;
    wrap.style.borderColor = _gridTheme.border;
  } else {
    wrap.style.background  = 'rgba(255,255,255,.04)';
    wrap.style.borderColor = 'rgba(255,255,255,.1)';
  }
}
function getEmptyCellBg(){ return (_gridTheme&&_gridTheme.cellEmpty)?_gridTheme.cellEmpty:'rgba(255,255,255,.05)'; }
function getEmptyCellBorder(){ return (_gridTheme&&_gridTheme.border)?_gridTheme.border:'rgba(255,255,255,.07)'; }
 
// ════════════════════════════════════════
//  GRID
// ════════════════════════════════════════
function calcCS(){
  const vw = Math.min(window.innerWidth, 480);
  const vh = window.innerHeight;
  // Available height for grid: total - safe areas - header - info row - stats - shapes - gaps
  const safeTop = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sat'))||44;
  const safeBot = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sab'))||20;
  const usedV = safeTop + safeBot + 48 + 34 + 24 + 100 + 60 + 16; // header+inforow+stats+shapes+gaps+padding
  const availH = vh - usedV;
  // Cell size from width (horizontal constraint)
  const csW = Math.floor((vw - 20 - 12 - 3*(GS-1)) / GS);
  // Cell size from height (vertical constraint)
  const csH = Math.floor(availH / GS);
  // Use the smaller of the two, min 26
  return Math.max(26, Math.min(csW, csH));
}
 
function renderGrid(){
  const g=$('grid'); g.innerHTML='';
  const cs=calcCS(), fs=Math.floor(cs*0.52);
  g.style.cssText=`display:grid;grid-template-columns:repeat(${GS},${cs}px);gap:3px;`;
  for(let r=0;r<GS;r++) for(let c=0;c<GS;c++){
    const el=document.createElement('div');
    el.className='cell'+(grid[r][c]?' filled':'');
    el.dataset.row=r; el.dataset.col=c;
    el.style.cssText=`width:${cs}px;height:${cs}px;font-size:${fs}px;`;
    if(grid[r][c]){
      el.textContent=grid[r][c];
      el.style.background=getBlockBg(grid[r][c],'.42');
    } else {
      el.style.background=getEmptyCellBg();
      el.style.borderColor=getEmptyCellBorder();
    }
    if(frozen[r+','+c]) el.classList.add('frozen');
    g.appendChild(el);
  }
  bindGrid();
}
 
function bindGrid(){
  // Solo click per tap-select desktop — touch gestito globalmente
  const old=$('grid'), ng=old.cloneNode(true);
  old.parentNode.replaceChild(ng,old);
  ng.querySelectorAll('.cell').forEach(cell=>{
    cell.addEventListener('click',()=>{
      if(activePowerup&&activePowerup!=='hint'){ usePowerupAt(+cell.dataset.row,+cell.dataset.col); return; }
      if(sel&&!dragShape)doPlace(+cell.dataset.row,+cell.dataset.col);
    });
    cell.addEventListener('mouseenter',()=>{ if(sel&&!dragShape)previewAt(+cell.dataset.row,+cell.dataset.col); });
    cell.addEventListener('mouseleave',()=>{ if(sel&&!dragShape)clearHL(); });
  });
}
 
function hideGhost(){ $('drag-ghost').style.display='none'; }
 
// ════════════════════════════════════════
//  SHAPES
// ════════════════════════════════════════
function thaw(){
  const del=[];
  for(const k in frozen){frozen[k]--;if(frozen[k]<=0)del.push(k);}
  del.forEach(k=>delete frozen[k]);
}
 
function hasAnySolution(shapeList){
  return shapeList.some(s=>{
    if(s.used||s.sp) return true; // specials always count as placeable
    for(let r=0;r<GS;r++) for(let c=0;c<GS;c++) if(canPlace(r,c,s)) return true;
    return false;
  });
}
 
function genShapes(){
  thaw();
  const area=$('shapes-area'); area.innerHTML=''; shapes=[];
  let specialUsed=false;
  for(let i=0;i<3;i++){
    const base=cfg.sh[Math.floor(Math.random()*cfg.sh.length)];
    const fr=getFruit();
    let sp=null;
    if(SET.special && !specialUsed && Math.random()<cfg.sc){
      const w = diff==='hard'
        ? [{sp:'bomb',v:35},{sp:'lightH',v:33},{sp:'lightV',v:27},{sp:'ice',v:5}]
        : diff==='medium'
        ? [{sp:'bomb',v:30},{sp:'lightH',v:27},{sp:'lightV',v:27},{sp:'ice',v:16}]
        : [{sp:'bomb',v:25},{sp:'lightH',v:22},{sp:'lightV',v:20},{sp:'ice',v:33}];
      let rv=Math.random()*100, acc=0;
      for(const x of w){ acc+=x.v; if(rv<acc){sp=x.sp;break;} }
      specialUsed=true;
    }
    shapes.push({cells:[...base.c],fr,sp,used:false,el:null});
  }
 
  // ── Garanzia soluzione: almeno 1 forma deve entrare nella griglia ──
  let attempts=0;
  while(!hasAnySolution(shapes) && attempts<40){
    attempts++;
    let worstIdx=-1, worstSize=-1;
    shapes.forEach((s,i)=>{ if(!s.sp && s.cells.length>worstSize){ worstSize=s.cells.length; worstIdx=i; } });
    if(worstIdx===-1) break;
    const smallPool = diff==='hard' ? [...S_SMALL,...S_MED] : [...S_TINY,...S_SMALL];
    const base = smallPool[Math.floor(Math.random()*smallPool.length)];
    shapes[worstIdx] = {cells:[...base.c], fr:getFruit(), sp:null, used:false, el:null};
  }
  // Fallback estremo: forza un 1×1 se la griglia è quasi piena
  if(!hasAnySolution(shapes)){
    for(let i=0;i<shapes.length;i++){
      if(!shapes[i].sp){ shapes[i]={cells:[[0,0]],fr:getFruit(),sp:null,used:false,el:null}; break; }
    }
  }
 
  const slotW=Math.floor((Math.min(window.innerWidth,480)-24-7*2)/3);
  const cs=Math.max(13,Math.floor(slotW/5.5)), fs=Math.max(9,cs-4);
  shapes.forEach((s,i)=>{
    const slot=document.createElement('div');
    slot.className='shape-slot'; slot.dataset.idx=i;
    if(s.sp){const b=document.createElement('div');b.className='sp-badge';b.textContent=SPEC[s.sp];slot.appendChild(b);}
    const maxC=Math.max(...s.cells.map(c=>c[0]));
    const maxR=Math.max(...s.cells.map(c=>c[1]));
    const sg=document.createElement('div'); sg.className='sgrid';
    sg.style.cssText=`display:grid;grid-template-columns:repeat(${maxC+1},${cs}px);gap:3px;`;
    for(let r=0;r<=maxR;r++) for(let c=0;c<=maxC;c++){
      const sc=document.createElement('div');
      const has=s.cells.some(([cc,rr])=>cc===c&&rr===r);
      sc.className='sc'+(has?'':' empty');
      sc.style.cssText=`width:${cs}px;height:${cs}px;font-size:${fs}px;`;
      if(has){sc.textContent=s.sp?SPEC[s.sp]:s.fr;sc.style.background=getBlockBg(s.fr,'.4');sc.style.borderRadius='4px';}
      sg.appendChild(sc);
    }
    slot.appendChild(sg);
    slot.addEventListener('touchstart',e=>{
      if(s.used)return;
      touchPendingIdx=i;
      touchPendingX=e.touches[0].clientX;
      touchPendingY=e.touches[0].clientY;
    },{passive:true});
    slot.addEventListener('click',()=>{ if(s.used||dragShape)return; pickShape(i); });
    area.appendChild(slot); s.el=slot;
  });
  renderGrid();
}
 
function pickShape(i){
  if(shapes[i].used)return;
  shapes.forEach((s,j)=>{ if(s.el) s.el.classList.toggle('selected',j===i); });
  sel=shapes[i];
}
 
// ════════════════════════════════════════
//  DRAG — Block Blast style
//  Il ghost appare sopra il dito, centrato sulla forma.
//  La griglia snappa alla cella griglia più vicina al
//  centro geometrico del ghost (non all'ancora del dito).
// ════════════════════════════════════════
 
// ════════════════════════════════════════
//  PARTICLE BURST SYSTEM
// ════════════════════════════════════════
(function(){
  const canvas = document.getElementById('particle-canvas');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  window.addEventListener('resize',()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
  const ctx = canvas.getContext('2d');
  let parts = [];
  const COLORS = ['#FFD700','#ff6b6b','#ff9f43','#2ecc71','#00d2ff','#f1c40f','#ff5fa2','#a8ff78'];
  function spawnBurst(x, y, count){
    for(let i=0;i<count;i++){
      const angle = (Math.random()*Math.PI*2);
      const spd = 2.5 + Math.random()*5;
      const size = 3 + Math.random()*5;
      parts.push({
        x, y,
        vx: Math.cos(angle)*spd,
        vy: Math.sin(angle)*spd - 1.5,
        life: 1,
        decay: 0.028 + Math.random()*0.025,
        size,
        color: COLORS[Math.floor(Math.random()*COLORS.length)],
        rot: Math.random()*Math.PI*2,
        rotV: (Math.random()-.5)*.3,
        square: Math.random()>.5
      });
    }
  }
  window.spawnBurst = spawnBurst;
  function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    parts = parts.filter(p=>p.life>0.01);
    for(const p of parts){
      ctx.save();
      ctx.globalAlpha = p.life * p.life;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      if(p.square){
        ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
      } else {
        ctx.beginPath();
        ctx.arc(0,0,p.size/2,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.18; // gravity
      p.vx *= 0.96;
      p.rot += p.rotV;
      p.life -= p.decay;
    }
    requestAnimationFrame(loop);
  }
  loop();
})();

// Offset verticale fisso: il ghost galleggia sopra il dito
const LIFT_PX = ()=> calcCS() * 2.2;
 
// Centro geometrico della shape (in celle, float)
function shapeCenterCR(shape){
  const cs = shape.cells;
  const cx = cs.reduce((s,[c])=>s+c,0)/cs.length;
  const cr = cs.reduce((s,[,r])=>s+r,0)/cs.length;
  return [cr, cx]; // [centerRow, centerCol]
}
 
function startDrag(idx, cx, cy){
  if(shapes[idx].used) return;
  dragShape = shapes[idx]; sel = dragShape;
  shapes.forEach((s,j)=>{ if(s.el) s.el.classList.toggle('selected', j===idx); });
  shapes[idx].el.classList.add('dragging-source');
  // Ancora = centro geometrico della forma
  const [cr,cc] = shapeCenterCR(dragShape);
  dragAnchorR = cr; dragAnchorC = cc;
  buildGhost(dragShape);
  positionGhost(cx, cy);
  dragPreviewR = -1; dragPreviewC = -1;
  // Mostra subito preview nella posizione iniziale
  updateDragPreview(cx, cy);
}
 
// Posiziona ghost centrato sulla forma, sollevato sopra il dito
function positionGhost(cx, cy){
  const cs = calcCS();
  const cellSzG = Math.max(16, Math.floor(cs * 0.85));
  const gap = 2;
  const maxC = Math.max(...dragShape.cells.map(c=>c[0]));
  const maxR = Math.max(...dragShape.cells.map(c=>c[1]));
  // Dimensione totale del ghost
  const ghostW = (maxC+1)*(cellSzG+gap) - gap;
  const ghostH = (maxR+1)*(cellSzG+gap) - gap;
  // Centro geometrico della forma in pixel nel ghost
  const [cr,cc] = shapeCenterCR(dragShape);
  const centerXinGhost = cc*(cellSzG+gap) + cellSzG/2;
  const centerYinGhost = cr*(cellSzG+gap) + cellSzG/2;
  const ghost = $('drag-ghost');
  // Posiziona così: centro forma del ghost = posizione dito, poi alza
  ghost.style.left = (cx - centerXinGhost - 8) + 'px'; // -8 per padding ghost
  ghost.style.top  = (cy - centerYinGhost - 8 - LIFT_PX()) + 'px';
  ghost.style.transform = 'none';
}
 
// Calcola quale cella top-left corrisponde al dito
// Usa il centro geometrico del ghost per trovare la cella griglia
function fingerToGridRC(cx, cy){
  const cs = calcCS();
  const liftY = cy - LIFT_PX();
  const [cr,cc] = shapeCenterCR(dragShape);
  const gridEl = document.getElementById('grid');
  const gridRect = gridEl.getBoundingClientRect();
  const relX = cx - gridRect.left;
  const relY = liftY - gridRect.top;
  const cellStep = cs + 3;
  // Snap to nearest cell center
  const centerGridC = Math.round((relX - cc * cellStep) / cellStep);
  const centerGridR = Math.round((relY - cr * cellStep) / cellStep);
  return [centerGridR, centerGridC];
}
 
function updateDragPreview(cx, cy){
  if(!dragShape) return;
  const [row, col] = fingerToGridRC(cx, cy);
  if(row !== dragPreviewR || col !== dragPreviewC){
    dragPreviewR = row; dragPreviewC = col;
    previewAt(row, col);
  }
}
 
function endDrag(cx, cy){
  hideGhost();
  // If a powerup is active and user lifts finger, use it on that cell
  if(activePowerup && activePowerup!=='hint' && !dragShape){
    const gridEl=document.getElementById('grid');
    const rect=gridEl.getBoundingClientRect();
    const cs=calcCS(), step=cs+3;
    const col=Math.floor((cx-rect.left)/step);
    const row=Math.floor((cy-rect.top)/step);
    if(row>=0&&row<GS&&col>=0&&col<GS) usePowerupAt(row,col);
    return;
  }
  if(dragShape){
    const [row, col] = fingerToGridRC(cx, cy);
    if(canPlace(row, col, dragShape)) doPlace(row, col);
    else clearHL();
    if(dragShape && dragShape.el) dragShape.el.classList.remove('dragging-source');
    dragShape = null;
  }
}
 
// ── GHOST builder aggiornato con celle più grandi ──
function buildGhost(shape){
  const gg=$('ghost-grid'); gg.innerHTML='';
  const cs=Math.max(18, Math.floor(calcCS()*0.85)), fs=Math.max(11,cs-5);
  const maxC=Math.max(...shape.cells.map(c=>c[0]));
  const maxR=Math.max(...shape.cells.map(c=>c[1]));
  gg.style.cssText=`display:grid;grid-template-columns:repeat(${maxC+1},${cs}px);gap:2px;`;
  for(let r=0;r<=maxR;r++) for(let c=0;c<=maxC;c++){
    const sc=document.createElement('div');
    const has=shape.cells.some(([cc,rr])=>cc===c&&rr===r);
    sc.className='sc'+(has?'':' empty');
    sc.style.cssText=`width:${cs}px;height:${cs}px;font-size:${fs}px;`;
    if(has){sc.textContent=shape.sp?SPEC[shape.sp]:shape.fr;sc.style.background=getBlockBg(shape.fr,'.55');sc.style.borderRadius='5px';}
    gg.appendChild(sc);
  }
  $('drag-ghost').style.display='block';
}
 
// ── MOUSE (desktop) ──
document.addEventListener('mousedown',e=>{
  const slot=e.target.closest('.shape-slot');
  if(slot){
    const idx=+slot.dataset.idx;
    if(idx>=0&&idx<shapes.length&&!shapes[idx].used){ mouseDown=true; startDrag(idx,e.clientX,e.clientY); }
  }
});
document.addEventListener('mousemove',e=>{
  if(mouseDown&&dragShape){
    positionGhost(e.clientX,e.clientY);
    updateDragPreview(e.clientX,e.clientY);
  }
});
document.addEventListener('mouseup',e=>{
  if(mouseDown&&dragShape){
    mouseDown=false;
    endDrag(e.clientX,e.clientY);
  }
  mouseDown=false;
});
 
// ── TOUCH GLOBALE ──
document.addEventListener('touchmove',e=>{
  const t=e.touches[0];
  if(!dragShape && touchPendingIdx>=0){
    const dx=t.clientX-touchPendingX, dy=t.clientY-touchPendingY;
    if(Math.sqrt(dx*dx+dy*dy)>DRAG_THRESHOLD){
      startDrag(touchPendingIdx, touchPendingX, touchPendingY);
      touchPendingIdx=-1;
    }
  }
  if(!dragShape) return;
  e.preventDefault();
  positionGhost(t.clientX, t.clientY);
  updateDragPreview(t.clientX, t.clientY);
},{passive:false});
 
document.addEventListener('touchend',e=>{
  touchPendingIdx=-1;
  if(!dragShape) return;
  e.preventDefault();
  const t=e.changedTouches[0];
  endDrag(t.clientX, t.clientY);
},{passive:false});
 
document.addEventListener('touchcancel',()=>{
  touchPendingIdx=-1;
  if(dragShape){
    hideGhost(); clearHL();
    if(dragShape.el) dragShape.el.classList.remove('dragging-source','selected');
    dragShape=null; sel=null;
  }
});
 
// ════════════════════════════════════════
//  PLACEMENT
// ════════════════════════════════════════
function getPc(row,col,s){ return s.cells.map(([c,r])=>[row+r,col+c]); }
function canPlace(row,col,s){ return getPc(row,col,s).every(([r,c])=>r>=0&&r<GS&&c>=0&&c<GS&&!grid[r][c]&&!frozen[r+','+c]); }
 
function previewAt(row,col){
  clearHL(); if(!sel)return;
  const sp=sel.sp;
  const cells=getPc(row,col,sel);
  const ok=cells.every(([r,c])=>r>=0&&r<GS&&c>=0&&c<GS&&!grid[r][c]&&!frozen[r+','+c]);
 
  // For specials: show effect zone preview
  if(sp==='bomb' && ok){
    // Centro del piazzamento = cella della forma
    const cx=cells[0][0], cc2=cells[0][1];
    // La forma stessa: highlight normale
    cells.forEach(([r,c])=>{ if(r>=0&&r<GS&&c>=0&&c<GS){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el)el.classList.add('highlight');} });
    // Zona esplosione 5x5: contorno rosso pulsante
    for(let r=cx-2;r<=cx+2;r++) for(let c=cc2-2;c<=cc2+2;c++){
      if(r>=0&&r<GS&&c>=0&&c<GS){
        const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
        if(el&&!el.classList.contains('highlight')) el.classList.add('bomb-preview');
      }
    }
    return;
  }
  if(sp==='lightH' && ok){
    const touchedRows=new Set(cells.map(([r])=>r));
    touchedRows.forEach(r=>{ for(let c=0;c<GS;c++){ const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`); if(el)el.classList.add('line-complete'); } });
    return;
  }
  if(sp==='lightV' && ok){
    const touchedCols=new Set(cells.map(([,c])=>c));
    touchedCols.forEach(c=>{ for(let r=0;r<GS;r++){ const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`); if(el)el.classList.add('line-complete'); } });
    return;
  }
  if(sp==='ice' && ok){
    // La forma stessa: highlight normale
    cells.forEach(([r,c])=>{ const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el)el.classList.add('highlight'); });
    // Zona ghiaccio (riga + colonna della forma): contorno blu pulsante
    const touchedRows=new Set(cells.map(([r])=>r));
    const touchedCols=new Set(cells.map(([,c])=>c));
    touchedRows.forEach(r=>{ for(let c=0;c<GS;c++){ const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el&&!el.classList.contains('highlight'))el.classList.add('ice-preview'); } });
    touchedCols.forEach(c=>{ for(let r=0;r<GS;r++){ const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el&&!el.classList.contains('highlight')&&!el.classList.contains('ice-preview'))el.classList.add('ice-preview'); } });
    return;
  }
 
  // Normal shape highlight
  cells.forEach(([r,c])=>{
    if(r>=0&&r<GS&&c>=0&&c<GS){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el)el.classList.add(ok?'highlight':'invalid');}
  });
  if(!ok) return;
  // Simulate placing and find which rows/cols would complete
  const placedSet=new Set(cells.map(([r,c])=>r+','+c));
  const completedRows=new Set(), completedCols=new Set();
  for(let r=0;r<GS;r++){
    let full=true;
    for(let c=0;c<GS;c++){ if(!grid[r][c]&&!placedSet.has(r+','+c)){full=false;break;} }
    if(full) completedRows.add(r);
  }
  for(let c=0;c<GS;c++){
    let full=true;
    for(let r=0;r<GS;r++){ if(!grid[r][c]&&!placedSet.has(r+','+c)){full=false;break;} }
    if(full) completedCols.add(c);
  }
  // Near-complete yellow hint
  for(let r=0;r<GS;r++){
    if(completedRows.has(r)) continue;
    let filled=0;
    for(let c=0;c<GS;c++) if(grid[r][c]||placedSet.has(r+','+c)) filled++;
    if(filled>=GS-1){ for(let c=0;c<GS;c++){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el)el.classList.add('line-ready');} }
  }
  for(let c=0;c<GS;c++){
    if(completedCols.has(c)) continue;
    let filled=0;
    for(let r=0;r<GS;r++) if(grid[r][c]||placedSet.has(r+','+c)) filled++;
    if(filled>=GS-1){ for(let r=0;r<GS;r++){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el)el.classList.add('line-ready');} }
  }
  completedRows.forEach(r=>{ for(let c=0;c<GS;c++){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el){el.classList.remove('highlight','line-ready');el.classList.add('line-complete');}} });
  completedCols.forEach(c=>{ for(let r=0;r<GS;r++){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el){el.classList.remove('highlight','line-ready');el.classList.add('line-complete');}} });
}
function clearHL(){ document.querySelectorAll('.cell.highlight,.cell.invalid,.cell.line-ready,.cell.line-complete,.cell.bomb-zone,.cell.bomb-preview,.cell.ice-preview').forEach(e=>e.classList.remove('highlight','invalid','line-ready','line-complete','bomb-zone','bomb-preview','ice-preview')); }
 
function doPlace(row,col){
  const shape=dragShape||sel;
  if(!shape||!canPlace(row,col,shape))return;
  const sp=shape.sp;
  const blockCount=shape.cells.length;
  const placedCells=getPc(row,col,shape);
 
  if(sp==='bomb'){
    // 5x5 blast centered on placement point, clears everything
    trackStat('useBomb',1);
    showFloat('💣 BOOM!',row,col);
    let cleared=0;
    for(let r=row-2;r<=row+2;r++) for(let c=col-2;c<=col+2;c++){
      if(r>=0&&r<GS&&c>=0&&c<GS){
        if(grid[r][c]) cleared++;
        grid[r][c]=null;
        delete frozen[r+','+c];
        if(SET.anim){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el)el.classList.add('clearing');}
      }
    }
    score += 150 + cleared*8;
 
  } else if(sp==='lightH'){
    // Clear ALL rows touched by the shape
    trackStat('useLH',1);
    const touchedRows=[...new Set(placedCells.map(([r])=>r))];
    showFloat(`⚡ x${touchedRows.length} RIGHE!`,row,col);
    touchedRows.forEach(r=>{
      for(let c=0;c<GS;c++){
        grid[r][c]=null;
        if(SET.anim){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el)el.classList.add('clearing');}
      }
      lines++; updMission(); trackStat('lines',1);
    });
    score += 120*touchedRows.length;
 
  } else if(sp==='lightV'){
    // Clear ALL columns touched by the shape
    trackStat('useLV',1);
    const touchedCols=[...new Set(placedCells.map(([,c])=>c))];
    showFloat(`🌩️ x${touchedCols.length} COL!`,row,col);
    touchedCols.forEach(c=>{
      for(let r=0;r<GS;r++){
        grid[r][c]=null;
        if(SET.anim){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);if(el)el.classList.add('clearing');}
      }
      lines++; updMission(); trackStat('lines',1);
    });
    score += 120*touchedCols.length;
 
  } else if(sp==='ice'){
    // Place the blocks, then freeze the entire row AND column for each placed cell
    trackStat('useIce',1);
    placedCells.forEach(([r,c])=>{grid[r][c]=shape.fr;});
    showFloat('❄️ FREEZE!',row,col);
    const touchedRows=new Set(placedCells.map(([r])=>r));
    const touchedCols=new Set(placedCells.map(([,c])=>c));
    // Freeze cross pattern (row + col of shape)
    touchedRows.forEach(r=>{
      for(let c=0;c<GS;c++){
        if(!grid[r][c]&&!placedCells.some(([pr,pc])=>pr===r&&pc===c)){
          frozen[r+','+c]=2;
          const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
          if(el){el.classList.add('frozen');if(SET.anim){el.classList.add('freeze-anim');setTimeout(()=>el.classList.remove('freeze-anim'),500);}}
        }
      }
    });
    touchedCols.forEach(c=>{
      for(let r=0;r<GS;r++){
        if(!grid[r][c]&&!placedCells.some(([pr,pc])=>pr===r&&pc===c)){
          frozen[r+','+c]=2;
          const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
          if(el){el.classList.add('frozen');if(SET.anim){el.classList.add('freeze-anim');setTimeout(()=>el.classList.remove('freeze-anim'),500);}}
        }
      }
    });
    score += 20 + blockCount*3;
    trackStat('placed',blockCount); trackStat('bigShape',blockCount);
 
  } else {
    // Normal placement
    placedCells.forEach(([r,c])=>{grid[r][c]=shape.fr;});
    score+=blockCount;
    trackStat('placed',blockCount); trackStat('bigShape',blockCount);
    showFloat('+'+blockCount,row,col);
    if(SET.anim) placedCells.forEach(([r,c])=>{
      const el=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
      if(el){el.classList.add('just-placed');setTimeout(()=>el.classList.remove('just-placed'),260);}
    });
  }
 
  shape.used=true;
  if(typeof clearHint==='function')clearHint();
  if(shape.el){shape.el.classList.add('used');shape.el.classList.remove('selected','dragging-source');}
  sel=null; dragShape=null; clearHL(); hideGhost();
  // Decrement frozen timers
  Object.keys(frozen).forEach(k=>{frozen[k]--;if(frozen[k]<=0)delete frozen[k];});
 
  // Instant: check lines and re-render immediately, no lag
  checkLines(); renderGrid(); updScore();
  if(shapes.every(s=>s.used)){ trackStat('turns',1); setTimeout(genShapes, SET.anim ? 260 : 0); }
  else checkGO();
}

//  COMBO + GRACE (fixed 3 mosse)
// ════════════════════════════════════════
const COMBO_GRACE_MAX = 3;
function updGraceUI(){
  const cg=$('combo-grace'), lbl=$('combo-lbl');
  if(combo===0&&comboGrace===0){ cg.style.display='none'; lbl.textContent=''; return; }
  if(combo>=2){ cg.style.display='none'; return; }
  if(comboGrace>0){
    cg.style.display='flex';
    lbl.textContent='🔥 COMBO!';
    lbl.style.color=comboGrace===1?'#e74c3c':'#ff9f43';
    for(let i=0;i<COMBO_GRACE_MAX;i++){
      const d=$('gd'+i); if(!d)continue;
      d.className='grace-dot'+(i<comboGrace?' lit'+(comboGrace===1?' low':''):'');
    }
  }
}
 
// ════════════════════════════════════════
//  LINES
// ════════════════════════════════════════
function checkLines(){
  const toC=[];
  for(let r=0;r<GS;r++) if(grid[r].every(c=>c!==null)) toC.push({t:'row',i:r});
  for(let c=0;c<GS;c++) if(grid.every(r=>r[c]!==null)) toC.push({t:'col',i:c});
 
  if(!toC.length){
    if(combo>0){
      if(comboGrace===0){
        // Prima mossa senza linee: dai sempre 3 grace moves
        comboGrace=COMBO_GRACE_MAX; updGraceUI();
      } else {
        comboGrace--;
        if(comboGrace===0){ combo=0; updGraceUI(); }
        else updGraceUI();
      }
    }
    return;
  }
 
  combo++; comboGrace=0;
  let ls=0;
  toC.forEach(({t,i})=>{
    ls+=100*(combo>1?combo:1); lines++;
    trackStat('lines',1);
    if(t==='row'){
      for(let c=0;c<GS;c++){
        grid[i][c]=null;
        if(SET.anim){const el=document.querySelector(`.cell[data-row="${i}"][data-col="${c}"]`);if(el)el.classList.add('clearing');}
      }
      // Particle burst along the row
      if(SET.anim && window.spawnBurst){
        const midCell = document.querySelector(`.cell[data-row="${i}"][data-col="${Math.floor(GS/2)}"]`);
        if(midCell){
          const r2=midCell.getBoundingClientRect();
          for(let c=0;c<GS;c+=2){
            const cel=document.querySelector(`.cell[data-row="${i}"][data-col="${c}"]`);
            if(cel){const rc=cel.getBoundingClientRect(); window.spawnBurst(rc.left+rc.width/2, rc.top+rc.height/2, 6);}
          }
        }
      }
    } else {
      for(let r=0;r<GS;r++){
        grid[r][i]=null;
        if(SET.anim){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${i}"]`);if(el)el.classList.add('clearing');}
      }
      // Particle burst along the column
      if(SET.anim && window.spawnBurst){
        for(let r=0;r<GS;r+=2){
          const cel=document.querySelector(`.cell[data-row="${r}"][data-col="${i}"]`);
          if(cel){const rc=cel.getBoundingClientRect(); window.spawnBurst(rc.left+rc.width/2, rc.top+rc.height/2, 6);}
        }
      }
    }
  });
  if(toC.length>=2) runStats.multiLine=Math.max(runStats.multiLine,toC.length);
  trackStat('combo',combo);
  score+=ls; updScore(); updMission();
  if(combo>=2){
    $('combo-lbl').textContent=`🔥 COMBO x${combo}!`;
    $('combo-lbl').style.color='#ff6b6b';
    showFloat(`+${ls} x${combo}!`,Math.floor(GS/2),Math.floor(GS/2));
  } else {
    $('combo-lbl').textContent='🔥 COMBO!';
    $('combo-lbl').style.color='#ff9f43';
    showFloat(`+${ls}`,Math.floor(GS/2),Math.floor(GS/2)+1);
  }
  updGraceUI();
  if(SET.anim){
    setTimeout(()=>{document.querySelectorAll('.cell.clearing').forEach(e=>e.classList.remove('clearing'));renderGrid();}, 180);
  } else {
    document.querySelectorAll('.cell.clearing').forEach(e=>e.classList.remove('clearing'));
    renderGrid();
  }
}

function updScore(){
  const displayed = activeMulti > 1 ? score * activeMulti : score;
  $('score').textContent = displayed.toLocaleString();
  const b=getBest(diff);
  if(displayed>b){setBest(diff,displayed);$('best-score').textContent=displayed.toLocaleString();}
  // track score objective
  if(activeObj&&activeObj.type==='score') checkObjProgress();
  else updObjMini();
}
function updMission(){
  const p=$('mission-prog');
  p.textContent=Math.min(lines,mission)+'/'+mission;
  if(lines>=mission){
    p.style.color='var(--green)'; score+=500;
    mission+=cfg.ms; showFloat('🎯 +500!',1,2);
    updScore();
    setTimeout(()=>{p.style.color='';updMission();},1600);
  }
}
function showFloat(txt,row,col){
  const cell=document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
  const fs=$('fscore');
  const rect=cell?cell.getBoundingClientRect():{left:100,top:200};
  fs.style.left=(rect.left+8)+'px'; fs.style.top=(rect.top-8)+'px';
  fs.style.opacity='1'; fs.style.transform='translateY(0)';
  fs.textContent=txt;
  clearTimeout(fs._t);
  fs._t=setTimeout(()=>{fs.style.opacity='0';fs.style.transform='translateY(-40px)';},90);
}

function checkGO(){
  const avail=shapes.filter(s=>!s.used);
  if(!avail.length)return;
  const ok=avail.some(s=>{for(let r=0;r<GS;r++)for(let c=0;c<GS;c++)if(canPlace(r,c,s))return true;return false;});
  if(!ok) setTimeout(triggerGO,600);
}

function showRealGameOver(){

    setBest(diff, Math.max(getBest(diff), finalScore));
    localStorage.removeItem('fb_active_multi');

  }
  const best=getBest(diff);
  $('go-final').textContent=finalScore.toLocaleString();
  const gd=$('go-diff-v'); gd.textContent=cfg.lbl; gd.style.color=cfg.col;

  $('go-lines-v').textContent=lines;

  $('go-screen').classList.add('fade-in');
}

function updPuUI(){
  const map={bomb:'bomb',lh:'lh',lv:'lv',ice:'ice',hint:'hint'};
  const spMap={bomb:'bomb',lh:'lightH',lv:'lightV',ice:'ice',hint:'hint'};
  Object.keys(map).forEach(k=>{
    const btn=$('pu-'+k); if(!btn)return;
    const n=getInv(map[k]);
    const isActive=activePowerup===spMap[k]||(k==='hint'&&activePowerup==='hint');
    btn.classList.toggle('empty-pu',n<=0&&!isActive);
    btn.classList.toggle('active-pu',isActive);
  });
}
 
function activatePowerup(sp){
  // sp: 'bomb','lightH','lightV','ice','hint'
  const invKey=sp==='lightH'?'lh':sp==='lightV'?'lv':sp==='bomb'?'bomb':sp==='ice'?'ice':'hint';
  if(getInv(invKey)<=0) return;
  if(activePowerup===sp){ activePowerup=null; clearHL(); sel=null; updPuUI(); return; }
  activePowerup=sp; sel=null; dragShape=null; clearHL(); hideGhost(); updPuUI();
  if(sp==='hint'){
    useInv('hint'); $('stat-hint').textContent=getInv('hint');
    activePowerup=null; updPuUI(); showHint(); return;
  }
  const msgs={bomb:'💣 Tocca una cella — esploderà 5×5!',lightH:'⚡ Tocca una cella — elimina tutta la riga!',lightV:'🌩️ Tocca una cella — elimina tutta la colonna!',ice:'❄️ Tocca una cella — congela zona attorno!'};
  showPuToast(msgs[sp]||'');
}
 
function usePowerupAt(row,col){
  const sp=activePowerup; if(!sp||sp==='hint') return false;
  const invKey=sp==='lightH'?'lh':sp==='lightV'?'lv':sp==='bomb'?'bomb':'ice';
  if(!useInv(invKey)) return false;
  if(sp==='bomb'){
    trackStat('useBomb',1); showFloat('💣 BOOM!',row,col); let cleared=0;
    for(let r=row-2;r<=row+2;r++) for(let cc=col-2;cc<=col+2;cc++){
      if(r>=0&&r<GS&&cc>=0&&cc<GS){ if(grid[r][cc])cleared++; grid[r][cc]=null; delete frozen[r+','+cc];
        if(SET.anim){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${cc}"]`);if(el)el.classList.add('clearing');} }
    }
    score+=150+cleared*8;
  } else if(sp==='lightH'){
    trackStat('useLH',1); showFloat('⚡ RIGA!',row,col);
    for(let cc=0;cc<GS;cc++){ grid[row][cc]=null;
      if(SET.anim){const el=document.querySelector(`.cell[data-row="${row}"][data-col="${cc}"]`);if(el)el.classList.add('clearing');} }
    lines++; updMission(); trackStat('lines',1); score+=120;
  } else if(sp==='lightV'){
    trackStat('useLV',1); showFloat('🌩️ COL!',row,col);
    for(let r=0;r<GS;r++){ grid[r][col]=null;
      if(SET.anim){const el=document.querySelector(`.cell[data-row="${r}"][data-col="${col}"]`);if(el)el.classList.add('clearing');} }
    lines++; updMission(); trackStat('lines',1); score+=120;
  } else if(sp==='ice'){
    trackStat('useIce',1); showFloat('❄️ FREEZE!',row,col);
    for(let r=row-1;r<=row+1;r++) for(let cc=col-1;cc<=col+1;cc++){
      if(r>=0&&r<GS&&cc>=0&&cc<GS&&!grid[r][cc]){ frozen[r+','+cc]=2;
        const el=document.querySelector(`.cell[data-row="${r}"][data-col="${cc}"]`);
        if(el){el.classList.add('frozen');if(SET.anim){el.classList.add('freeze-anim');setTimeout(()=>el.classList.remove('freeze-anim'),500);}} }
    }
    score+=30;
  }
  activePowerup=null; $('stat-'+invKey).textContent=getInv(invKey);
  clearHL(); updPuUI(); updScore();
  setTimeout(()=>{ checkLines(); renderGrid(); updScore(); checkGO(); },animD());
  return true;
}
 
function showPuToast(msg){
  let el=$('pu-toast');
  if(!el){
    el=document.createElement('div'); el.id='pu-toast';
    el.style.cssText='position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+110px);left:50%;transform:translateX(-50%) translateY(12px);background:rgba(20,8,46,.96);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:13px;font-weight:700;border-radius:50px;padding:8px 20px;opacity:0;transition:opacity .2s,transform .2s;z-index:998;white-space:nowrap;pointer-events:none;font-family:Nunito,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.4);';
    document.body.appendChild(el);
  }
  el.textContent=msg; el.style.opacity='1'; el.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(showPuToast._t);
  showPuToast._t=setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(-50%) translateY(12px)'; },2500);
}
 
// Hint system
let hintActive=false;
function clearHint(){ document.querySelectorAll('.cell.hint-shape').forEach(e=>e.classList.remove('hint-shape')); hintActive=false; }
function showHint(){
  clearHint(); clearHL();
  let bestScore=-1,bestShape=null,bestR=-1,bestC=-1;
  const avail=shapes.filter(s=>!s.used); if(!avail.length)return;
  for(const s of avail){
    for(let r=0;r<GS;r++) for(let col=0;col<GS;col++){
      if(!canPlace(r,col,s)) continue;
      const cells=getPc(r,col,s);
      const ps=new Set(cells.map(([pr,pc])=>pr+','+pc));
      let ls=0;
      for(let rr=0;rr<GS;rr++){
        let full=true; for(let cc=0;cc<GS;cc++) if(!grid[rr][cc]&&!ps.has(rr+','+cc)){full=false;break;}
        if(full) ls+=3; else { let f=0; for(let cc=0;cc<GS;cc++) if(grid[rr][cc]||ps.has(rr+','+cc))f++; if(f>=GS-1)ls+=1; }
      }
      for(let cc=0;cc<GS;cc++){
        let full=true; for(let rr=0;rr<GS;rr++) if(!grid[rr][cc]&&!ps.has(rr+','+cc)){full=false;break;}
        if(full) ls+=3; else { let f=0; for(let rr=0;rr<GS;rr++) if(grid[rr][cc]||ps.has(rr+','+cc))f++; if(f>=GS-1)ls+=1; }
      }
      let prox=0; cells.forEach(([pr,pc])=>{ [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{ const nr=pr+dr,nc=pc+dc; if(nr>=0&&nr<GS&&nc>=0&&nc<GS&&grid[nr][nc])prox++; }); });
      const tot=ls*10+s.cells.length+prox;
      if(tot>bestScore){bestScore=tot;bestShape=s;bestR=r;bestC=col;}
    }
  }
  if(!bestShape)return;
  shapes.forEach((s,i)=>{ if(s.el)s.el.classList.toggle('selected',s===bestShape); }); sel=bestShape;
  getPc(bestR,bestC,bestShape).forEach(([r,col])=>{ const el=document.querySelector(`.cell[data-row="${r}"][data-col="${col}"]`); if(el)el.classList.add('hint-shape'); });
  hintActive=true;
  clearTimeout(showHint._t); showHint._t=setTimeout(()=>clearHint(),3000);
}
 
// ════════════════════════════════════════
//  EVENTS
// ════════════════════════════════════════
window.addEventListener('resize',()=>renderGrid());
$('menu-btn').addEventListener('click',()=>{ dragShape=null;hideGhost();location.href='index.html'; });
$('play-again-btn').addEventListener('click',startGame);
$('go-menu-btn').addEventListener('click',()=>{ location.href='index.html'; });
 
// Powerup buttons
['bomb','lh','lv','ice','hint'].forEach(k=>{
  const spMap={bomb:'bomb',lh:'lightH',lv:'lightV',ice:'ice',hint:'hint'};
  const btn=$('pu-'+k); if(btn) btn.addEventListener('click',()=>activatePowerup(spMap[k]));
});
 
// Rewarded overlay buttons
$('aro-btn-watch').addEventListener('click', ()=>{ if(!$('aro-btn-watch').disabled) claimReward(); });
$('aro-btn-skip').addEventListener('click', ()=>{
  $('ad-rewarded-overlay').classList.remove('visible');
  rewardedUsedThisGame = true;
  showRealGameOver();
});
 
// Boot
startGame();
</script>
