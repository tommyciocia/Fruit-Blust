<style>
/* ── Menu layout ── */
#menu{
  justify-content:space-evenly;
  min-height:100%;
  /* override .page default padding */
  padding-top:calc(var(--sat) + 6px) !important;
  padding-bottom:calc(var(--sab) + 8px) !important;
  gap:0;
}

/* Logo — più piccolo */
.logo-wrap{text-align:center;margin:0;}
.logo-icon{font-size:clamp(28px,7vw,38px);display:block;filter:drop-shadow(0 0 10px rgba(255,107,107,.5));}
.logo-title{font-family:'Fredoka One',cursive;font-size:clamp(30px,9vw,42px);color:#fff;
  text-shadow:0 0 28px rgba(255,107,107,.5),0 2px 0 rgba(0,0,0,.3);line-height:1;letter-spacing:1px;}
.logo-sub{font-size:10px;color:rgba(255,255,255,.38);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}

/* Stats row — best score + bonus affiancati */
.stats-row{
  display:flex;gap:8px;width:100%;margin:0;
}
.stat-mini{
  flex:1;border-radius:16px;padding:9px 12px;text-align:center;
  position:relative;overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.06);
}
.stat-mini.best{
  background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,150,0,.08));
  border:1px solid rgba(255,215,0,.25);
  box-shadow:0 2px 14px rgba(255,215,0,.08),inset 0 1px 0 rgba(255,215,0,.08);
}
.stat-mini.bonus{
  background:linear-gradient(135deg,rgba(138,43,226,.18),rgba(75,0,130,.12));
  border:1px solid rgba(180,100,255,.28);
}
.stat-mini.bonus::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(180,100,255,.06),transparent);
  animation:bonusShimmer 4s infinite;
}
@keyframes bonusShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.sm-icon{font-size:16px;display:block;margin-bottom:1px;}
.sm-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.stat-mini.best .sm-label{color:rgba(255,215,0,.6);}
.stat-mini.bonus .sm-label{color:rgba(200,150,255,.65);}
.sm-val{font-family:'Fredoka One',cursive;font-size:clamp(18px,5.5vw,24px);line-height:1;}
.stat-mini.best .sm-val{color:var(--gold);}
.stat-mini.bonus .sm-val{color:#d4a8ff;}
.sm-sub{font-size:9px;margin-top:1px;}
.stat-mini.best .sm-sub{color:rgba(255,255,255,.3);}
.stat-mini.bonus .sm-sub{color:rgba(200,150,255,.4);}

/* Difficulty cards */
#diff-section{width:100%;margin:0;}
.diff-header{font-size:10px;color:rgba(255,255,255,.38);letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:8px;}
#diff-cards{display:flex;gap:6px;width:100%;}
.diff-card{
  flex:1;border-radius:16px;padding:9px 4px 8px;
  border:2px solid transparent;cursor:pointer;text-align:center;
  position:relative;overflow:hidden;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),border-color .22s,box-shadow .22s,background .22s;
  box-shadow:0 2px 14px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.09);
}
.diff-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;}
.diff-card.easy{background:rgba(46,204,113,.1);}
.diff-card.easy::before{background:rgba(46,204,113,.5);}
.diff-card.easy.selected{border-color:var(--green);box-shadow:0 5px 18px rgba(46,204,113,.25);}
.diff-card.medium{background:rgba(241,196,15,.1);}
.diff-card.medium::before{background:rgba(241,196,15,.5);}
.diff-card.medium.selected{border-color:var(--yellow);box-shadow:0 5px 18px rgba(241,196,15,.25);}
.diff-card.hard{background:rgba(231,76,60,.1);}
.diff-card.hard::before{background:rgba(231,76,60,.5);}
.diff-card.hard.selected{border-color:var(--red);box-shadow:0 5px 18px rgba(231,76,60,.25);}
.diff-card.selected{transform:translateY(-3px) scale(1.02);}
.diff-check{position:absolute;top:5px;right:5px;font-size:11px;opacity:0;color:#fff;transition:opacity .2s;}
.diff-card.selected .diff-check{opacity:1;}
.diff-icon{font-size:clamp(18px,5vw,24px);margin-bottom:4px;display:block;}
.diff-name{font-family:'Fredoka One',cursive;font-size:clamp(12px,3.5vw,16px);color:#fff;margin-bottom:3px;}
.diff-desc{font-size:clamp(8px,2vw,10px);color:rgba(255,255,255,.45);line-height:1.28;margin-bottom:4px;}
.diff-badge{font-size:8px;font-weight:900;border-radius:6px;padding:2px 6px;display:inline-block;}
.easy .diff-badge{background:rgba(46,204,113,.16);color:#2ecc71;border:1px solid rgba(46,204,113,.26);}
.medium .diff-badge{background:rgba(241,196,15,.16);color:#f1c40f;border:1px solid rgba(241,196,15,.26);}
.hard .diff-badge{background:rgba(231,76,60,.16);color:#e74c3c;border:1px solid rgba(231,76,60,.26);}

/* Play button — più compatto */
.btn-primary{
  background:linear-gradient(135deg,#ff6b6b,#ff9f43);color:#fff;border:none;
  padding:15px 0;border-radius:50px;
  font-size:clamp(18px,5.5vw,22px);font-family:'Fredoka One',cursive;
  cursor:pointer;letter-spacing:1.5px;width:100%;max-width:300px;
  box-shadow:0 8px 32px rgba(255,107,107,.48),0 2px 10px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.2);
  margin:0;position:relative;overflow:hidden;
  transition:transform .15s,box-shadow .15s;
}
.btn-primary::after{content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent);
  animation:shimmer 3s infinite;}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}
.btn-primary:active{transform:scale(.96);}

/* Nav buttons */
.nav-btns{display:flex;gap:7px;width:100%;max-width:360px;margin-top:0;}
.nav-btn{
  flex:1;background:rgba(255,255,255,.09);color:rgba(255,255,255,.75);
  border:1px solid rgba(255,255,255,.16);padding:10px 4px;border-radius:50px;
  font-size:clamp(10px,2.8vw,13px);font-family:'Nunito',sans-serif;font-weight:700;
  cursor:pointer;text-align:center;
  transition:background .15s,transform .12s;
  box-shadow:0 2px 10px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.09);
}
.nav-btn:active{background:rgba(255,255,255,.16);transform:scale(.96);}
</style>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(reg => {
    reg.update();
    reg.addEventListener('updatefound', () => {
      const sw = reg.installing;
      sw.addEventListener('statechange', () => {
        if(sw.state === 'installed' && navigator.serviceWorker.controller){
          window.location.reload();
        }
      });
    });
  });
  // Ascolta il messaggio dal SW: nuovo deploy rilevato -> ricarica subito
  navigator.serviceWorker.addEventListener('message', e => {
    if(e.data && e.data.type === 'SW_UPDATED') window.location.reload();
  });
}
</script>

<body>
<div id="app">
<div id="menu" class="page fade-in">

  <div class="logo-wrap">
    <span class="logo-icon">🍉</span>
    <div class="logo-title">FruitBlast</div>
    <div class="logo-sub">il gioco della frutta</div>
  </div>

  <!-- Record + Bonus affiancati -->
  <div class="stats-row">
    <div class="stat-mini best">
      <span class="sm-icon">🏆</span>
      <div class="sm-label">Miglior Score</div>
      <div class="sm-val" id="menu-best-val">0</div>
      <div class="sm-sub" id="menu-best-diff"></div>
    </div>
    <div class="stat-mini bonus">
      <span class="sm-icon">💎</span>
      <div class="sm-label">Punti Bonus</div>
      <div class="sm-val" id="bonus-val">0</div>
      <div class="sm-sub">da obiettivi</div>
    </div>
  </div>

  <div id="diff-section">
    <div class="diff-header">✦ Scegli difficoltà ✦</div>
    <div id="diff-cards">
      <div class="diff-card easy selected" data-diff="easy">
        <div class="diff-check">✓</div>
        <span class="diff-icon">🌱</span>
        <div class="diff-name">Facile</div>
        <div class="diff-desc">Forme semplici<br>Griglia 8×8</div>
        <span class="diff-badge">Rilassante</span>
      </div>
      <div class="diff-card medium" data-diff="medium">
        <div class="diff-check">✓</div>
        <span class="diff-icon">🔥</span>
        <div class="diff-name">Medio</div>
        <div class="diff-desc">Più varianti<br>Griglia 8×8</div>
        <span class="diff-badge">Sfidante</span>
      </div>
      <div class="diff-card hard" data-diff="hard">
        <div class="diff-check">✓</div>
        <span class="diff-icon">💀</span>
        <div class="diff-name">Difficile</div>
        <div class="diff-desc">Forme complesse<br>Griglia 10×10</div>
        <span class="diff-badge">Estremo</span>
      </div>
    </div>
  </div>

  <button class="btn-primary" id="play-btn">▶  GIOCA</button>

  <div class="nav-btns">
    <button class="nav-btn" id="obj-btn">🎯 Obiettivi</button>
    <button class="nav-btn" id="shop-btn">🛒 Negozio</button>
    <button class="nav-btn" id="settings-btn">⚙️ Impostazioni</button>
  </div>

</div>
</div>

<script src="data.js"></script>
<script>
const $=id=>document.getElementById(id);
let diff='easy';

function updBest(){
  $('menu-best-val').textContent = getBest(diff).toLocaleString();
  $('menu-best-diff').textContent = DCFG[diff].lbl;
}
function updBonus(){
  $('bonus-val').textContent = getBonusPoints().toLocaleString();
}

document.querySelectorAll('.diff-card').forEach(card=>{
  card.addEventListener('click',()=>{
    document.querySelectorAll('.diff-card').forEach(c=>c.classList.remove('selected'));
    card.classList.add('selected');
    diff = card.dataset.diff;
    updBest();
  });
});

$('play-btn').addEventListener('click',()=>{ sessionStorage.setItem('fb_diff',diff); location.href='game.html'; });
$('obj-btn').addEventListener('click',()=>{ sessionStorage.setItem('fb_diff',diff); location.href='objectives.html'; });
$('shop-btn').addEventListener('click',()=>{ location.href='shop.html'; });
$('settings-btn').addEventListener('click',()=>{ location.href='settings.html'; });

updBest();
updBonus();
</script>
</body>
</html>
