<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🍉 FruitBlast</title>
<link rel="stylesheet" href="style.css">
<style>
/* ── Menu-specific ── */
#menu{padding-top:14px;gap:0;}
.best-card{
  background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,150,0,.07));
  border:1px solid rgba(255,215,0,.2);border-radius:16px;
  padding:10px 28px;margin:14px 0 18px;text-align:center;
  position:relative;overflow:hidden;width:100%;
}
.best-card::before{content:'⭐';position:absolute;top:-6px;left:8px;font-size:26px;opacity:.1;}
.best-card::after{content:'⭐';position:absolute;bottom:-6px;right:8px;font-size:26px;opacity:.1;}
.best-label{font-size:10px;color:rgba(255,215,0,.6);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
#menu-best-val{font-family:'Fredoka One',cursive;font-size:clamp(26px,8vw,34px);color:var(--gold);}
.best-diff-label{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px;}

/* Difficulty cards */
#diff-section{width:100%;margin-bottom:18px;}
.diff-header{font-size:11px;color:rgba(255,255,255,.42);letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:11px;}
#diff-cards{display:flex;gap:7px;width:100%;}
.diff-card{
  flex:1;border-radius:16px;padding:clamp(10px,3vw,15px) 5px clamp(10px,3vw,13px);
  border:2px solid transparent;cursor:pointer;text-align:center;
  position:relative;overflow:hidden;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),border-color .2s,box-shadow .2s;
}
.diff-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0;}
.diff-card.easy{background:rgba(46,204,113,.1);}
.diff-card.easy::before{background:rgba(46,204,113,.5);}
.diff-card.easy.selected{border-color:var(--green);box-shadow:0 6px 22px rgba(46,204,113,.28);}
.diff-card.medium{background:rgba(241,196,15,.1);}
.diff-card.medium::before{background:rgba(241,196,15,.5);}
.diff-card.medium.selected{border-color:var(--yellow);box-shadow:0 6px 22px rgba(241,196,15,.28);}
.diff-card.hard{background:rgba(231,76,60,.1);}
.diff-card.hard::before{background:rgba(231,76,60,.5);}
.diff-card.hard.selected{border-color:var(--red);box-shadow:0 6px 22px rgba(231,76,60,.28);}
.diff-card.selected{transform:translateY(-4px) scale(1.03);}
.diff-check{position:absolute;top:6px;right:6px;font-size:12px;opacity:0;color:#fff;transition:opacity .2s;}
.diff-card.selected .diff-check{opacity:1;}
.diff-icon{font-size:clamp(22px,6vw,28px);margin-bottom:5px;display:block;}
.diff-name{font-family:'Fredoka One',cursive;font-size:clamp(14px,4vw,18px);color:#fff;margin-bottom:4px;}
.diff-desc{font-size:clamp(9px,2.2vw,11px);color:rgba(255,255,255,.48);line-height:1.32;margin-bottom:5px;}
.diff-badge{font-size:9px;font-weight:900;border-radius:7px;padding:2px 7px;display:inline-block;}
.easy .diff-badge{background:rgba(46,204,113,.16);color:#2ecc71;border:1px solid rgba(46,204,113,.26);}
.medium .diff-badge{background:rgba(241,196,15,.16);color:#f1c40f;border:1px solid rgba(241,196,15,.26);}
.hard .diff-badge{background:rgba(231,76,60,.16);color:#e74c3c;border:1px solid rgba(231,76,60,.26);}

/* Nav buttons */
.nav-btns{display:flex;gap:8px;width:100%;max-width:320px;margin-top:2px;}
.nav-btn{
  flex:1;background:var(--glass);color:rgba(255,255,255,.7);
  border:1px solid var(--gb);padding:11px 0;border-radius:50px;
  font-size:14px;font-family:'Nunito',sans-serif;font-weight:700;
  cursor:pointer;text-align:center;transition:background .15s;
}
.nav-btn:active{background:rgba(255,255,255,.16);}
</style>
</head>
<body>
<div id="app">
<div id="menu" class="page fade-in">

  <div class="logo-wrap">
    <span class="logo-icon">🍉</span>
    <div class="logo-title">FruitBlast</div>
    <div class="logo-sub">il gioco della frutta</div>
  </div>

  <div class="best-card">
    <div class="best-label">Miglior Punteggio</div>
    <div id="menu-best-val">0</div>
    <div class="best-diff-label" id="menu-best-diff"></div>
  </div>

  <div id="diff-section">
    <div class="diff-header">✦ Scegli difficoltà ✦</div>
    <div id="diff-cards">
      <div class="diff-card easy selected" data-diff="easy">
        <div class="diff-check">✓</div>
        <span class="diff-icon">🌱</span>
        <div class="diff-name">Facile</div>
        <div class="diff-desc">Forme semplici<br>Griglia 8×8</div>
        <span class="diff-badge">Rilassante</span>
      </div>
      <div class="diff-card medium" data-diff="medium">
        <div class="diff-check">✓</div>
        <span class="diff-icon">🔥</span>
        <div class="diff-name">Medio</div>
        <div class="diff-desc">Più varianti<br>Griglia 8×8</div>
        <span class="diff-badge">Sfidante</span>
      </div>
      <div class="diff-card hard" data-diff="hard">
        <div class="diff-check">✓</div>
        <span class="diff-icon">💀</span>
        <div class="diff-name">Difficile</div>
        <div class="diff-desc">Forme complesse<br>Griglia 10×10</div>
        <span class="diff-badge">Estremo</span>
      </div>
    </div>
  </div>

  <button class="btn-primary" id="play-btn">▶  GIOCA</button>

  <div class="nav-btns">
    <button class="nav-btn" id="obj-btn">🎯 Obiettivi</button>
    <button class="nav-btn" id="settings-btn">⚙️ Impostazioni</button>
  </div>

</div>
</div>

<script src="data.js"></script>
<script>
const $=id=>document.getElementById(id);
let diff='easy';

function updBest(){
  $('menu-best-val').textContent = getBest(diff).toLocaleString();
  $('menu-best-diff').textContent = DCFG[diff].lbl;
}

document.querySelectorAll('.diff-card').forEach(card=>{
  card.addEventListener('click',()=>{
    document.querySelectorAll('.diff-card').forEach(c=>c.classList.remove('selected'));
    card.classList.add('selected');
    diff = card.dataset.diff;
    updBest();
  });
});

$('play-btn').addEventListener('click',()=>{
  sessionStorage.setItem('fb_diff', diff);
  location.href='game.html';
});

$('obj-btn').addEventListener('click',()=>{
  sessionStorage.setItem('fb_diff', diff);
  location.href='objectives.html';
});

$('settings-btn').addEventListener('click',()=>{
  location.href='settings.html';
});

updBest();
</script>
</body>
</html>
