<style>
.obj-page{gap:9px;}
.diff-tabs{display:flex;gap:6px;width:100%;}
.diff-tab{flex:1;padding:9px 0;border-radius:13px;cursor:pointer;text-align:center;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);color:rgba(255,255,255,.58);transition:all .18s;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.diff-tab.active-easy{background:rgba(46,204,113,.18);border-color:#2ecc71;color:#2ecc71;}
.diff-tab.active-medium{background:rgba(241,196,15,.18);border-color:#f1c40f;color:#f1c40f;}
.diff-tab.active-hard{background:rgba(231,76,60,.18);border-color:#e74c3c;color:#e74c3c;}
.progress-header{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:16px;padding:12px 14px;box-shadow:0 2px 12px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.07);}
.ph-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.ph-title{font-family:'Fredoka One',cursive;font-size:15px;color:#fff;}
.ph-sub{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
.ph-count{font-family:'Fredoka One',cursive;font-size:26px;color:var(--gold);line-height:1;}
.ph-bar-wrap{height:7px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;}
.ph-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),#ff9f43);transition:width .6s cubic-bezier(.34,1.56,.64,1);}
.current-obj-wrap{width:100%;}
.current-label{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;text-align:center;}
.current-card{background:rgba(255,255,255,.07);border:2px solid rgba(255,215,0,.4);border-radius:18px;padding:14px;width:100%;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(255,215,0,.12),inset 0 1px 0 rgba(255,255,255,.08);}
.current-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),#ff9f43);}
.cc-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.cc-icon{font-size:34px;line-height:1;}
.cc-info{flex:1;}
.cc-name{font-family:'Fredoka One',cursive;font-size:18px;color:#fff;margin-bottom:2px;}
.cc-desc{font-size:13px;color:rgba(255,255,255,.6);line-height:1.4;}
.cc-reward{font-family:'Fredoka One',cursive;font-size:14px;color:var(--gold);margin-top:3px;}
.cc-progress{margin-top:8px;}
.cc-prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.cc-prog-label{font-size:12px;color:rgba(255,255,255,.5);}
.cc-prog-val{font-size:13px;font-weight:900;color:#fff;}
.cc-bar-wrap{height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;}
.cc-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),#ff9f43);transition:width .5s cubic-bezier(.34,1.56,.64,1);}
.cc-note{font-size:10px;color:rgba(255,215,0,.6);text-align:center;margin-top:6px;font-style:italic;}
.section-label{font-size:10px;color:rgba(255,255,255,.32);text-transform:uppercase;letter-spacing:1.5px;text-align:center;width:100%;}
.obj-grid{display:flex;flex-direction:column;gap:7px;width:100%;}
.obj-row{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:14px;padding:9px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.06);}
.obj-row.obj-active{border-color:rgba(255,215,0,.38);background:rgba(255,215,0,.07);box-shadow:0 0 14px rgba(255,215,0,.1),inset 0 1px 0 rgba(255,215,0,.1);}
.obj-row.obj-done{border-color:rgba(46,204,113,.35);background:rgba(46,204,113,.07);box-shadow:0 0 10px rgba(46,204,113,.08);}
.obj-row.obj-upcoming{opacity:.7;}
.or-icon{font-size:18px;min-width:26px;text-align:center;}
.or-info{flex:1;min-width:0;}
.or-name{font-size:12px;font-weight:900;color:#fff;margin-bottom:1px;}
.or-desc{font-size:10px;color:rgba(255,255,255,.45);line-height:1.25;}
.or-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;min-width:52px;}
.or-reward{font-family:'Fredoka One',cursive;font-size:13px;color:var(--gold);}
.or-status{font-size:18px;}
.or-prog{font-size:10px;color:rgba(255,255,255,.4);}
.or-bar-wrap{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:4px;overflow:hidden;}
.or-bar{height:100%;border-radius:2px;background:var(--gold);}
.or-bar.done{background:var(--green);}
.hidden-card{width:100%;border-radius:16px;padding:20px 16px;text-align:center;background:rgba(255,255,255,.03);border:2px dashed rgba(255,255,255,.12);position:relative;overflow:hidden;}
.hidden-card::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,255,255,.012) 10px,rgba(255,255,255,.012) 20px);}
.hc-locks{font-size:28px;letter-spacing:4px;display:block;margin-bottom:8px;opacity:.45;}
.hc-title{font-family:'Fredoka One',cursive;font-size:16px;color:rgba(255,255,255,.4);margin-bottom:5px;}
.hc-sub{font-size:11px;color:rgba(255,255,255,.22);line-height:1.5;}
.hc-pill{display:inline-flex;align-items:center;gap:6px;margin-top:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:5px 16px;font-size:12px;font-weight:900;color:rgba(255,255,255,.38);letter-spacing:.5px;}
.hc-pill-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);}
</style>
<script>
if('serviceWorker' in navigator && location.protocol !== 'file:'){
  navigator.serviceWorker.register('./sw.js').then(reg => {
    reg.update();
    reg.addEventListener('updatefound', () => {
      const sw = reg.installing;
      sw.addEventListener('statechange', () => {
        if(sw.state === 'installed' && navigator.serviceWorker.controller) window.location.reload();
      });
    });
  });
  navigator.serviceWorker.addEventListener('message', e => {
    if(e.data && e.data.type === 'SW_UPDATED') window.location.reload();
  });
}
</script>

<body>
<div id="app">
<div class="page obj-page fade-in sub-page">

  <div class="page-header">
    <button class="back-btn" id="back-btn">← Menu</button>
    <div class="page-title">🎯 Obiettivi</div>
  </div>

  <div class="diff-tabs">
    <button class="diff-tab" data-diff="easy">🌱 Facile</button>
    <button class="diff-tab" data-diff="medium">🔥 Medio</button>
    <button class="diff-tab" data-diff="hard">💀 Difficile</button>
  </div>

  <div class="progress-header">
    <div class="ph-row">
      <div>
        <div class="ph-title">Progressi</div>
        <div class="ph-sub">obiettivi completati</div>
      </div>
      <div class="ph-count" id="ph-count">0 / 30</div>
    </div>
    <div class="ph-bar-wrap"><div class="ph-bar" id="ph-bar" style="width:0%"></div></div>
  </div>

  <div class="current-obj-wrap">
    <div class="current-label">Obiettivo attuale</div>
    <div class="current-card">
      <div class="cc-head">
        <div class="cc-icon" id="cc-icon">🎯</div>
        <div class="cc-info">
          <div class="cc-name" id="cc-name">—</div>
          <div class="cc-desc" id="cc-desc">—</div>
          <div class="cc-reward" id="cc-reward">+0 pt</div>
        </div>
      </div>
      <div class="cc-progress">
        <div class="cc-prog-row">
          <span class="cc-prog-label">Progresso</span>
          <span class="cc-prog-val" id="cc-prog-val">0 / 0</span>
        </div>
        <div class="cc-bar-wrap"><div class="cc-bar" id="cc-bar" style="width:0%"></div></div>
      </div>
      <div class="cc-note" id="cc-note"></div>
    </div>
  </div>

  <div class="section-label" id="section-label"></div>
  <div class="obj-grid" id="obj-grid"></div>

  <div class="hidden-card" id="hidden-card" style="display:none;">
    <span class="hc-locks">🔒🔒🔒</span>
    <div class="hc-title">Sfide nascoste</div>
    <div class="hc-sub">Completa le sfide visibili per<br>scoprire i prossimi obiettivi</div>
    <div class="hc-pill">
      <div class="hc-pill-dot"></div>
      <span id="hc-count">+25 nascoste</span>
      <div class="hc-pill-dot"></div>
    </div>
  </div>

</div>
</div>

<script src="data.js"></script>
<script>
const $=id=>document.getElementById(id);
const VISIBLE_AHEAD = 5;
let activeDiff = sessionStorage.getItem('fb_diff')||'easy';

function render(){
  const objs = OBJECTIVES[activeDiff];
  const state = getObjState(activeDiff);
  const completed = new Set(state.completed||[]);
  const doneCount = completed.size;

  // Derive current index from completed set (first non-completed), not stored idx which can desync
  let idx = objs.findIndex(o => !completed.has(o.id));
  if(idx === -1) idx = objs.length - 1; // all done

  document.querySelectorAll('.diff-tab').forEach(t=>{
    t.className='diff-tab'+(t.dataset.diff===activeDiff?' active-'+activeDiff:'');
  });

  $('ph-count').textContent = doneCount+' / '+objs.length;
  $('ph-bar').style.width = Math.round(doneCount/objs.length*100)+'%';

  const cur = objs[idx];
  const isDone = completed.has(cur.id);
  const prog = isDone ? cur.target : getProgress(cur, activeDiff);
  $('cc-icon').textContent = cur.icon;
  $('cc-name').textContent = cur.name;
  $('cc-desc').textContent = cur.desc;
  $('cc-reward').textContent = '+'+cur.reward.toLocaleString()+' pt bonus';
  $('cc-prog-val').textContent = Math.min(prog,cur.target)+' / '+cur.target;
  $('cc-bar').style.width = Math.min(100,Math.round(prog/cur.target*100))+'%';
  $('cc-bar').style.background = isDone ? 'var(--green)' : '';
  // Mostra label corretta: cumulativo vs singola partita
  document.querySelector('.cc-prog-label').textContent =
    isDone ? 'Completato' : cur.cum ? 'Totale accumulato' : 'Miglior partita';
  $('cc-note').textContent = isDone && idx === objs.length-1
    ? '🏆 Tutti gli obiettivi completati!'
    : isDone
    ? '✅ Completato!'
    : (idx+1 < objs.length ? `Obiettivo ${idx+1} di ${objs.length}` : 'Ultimo obiettivo!');

  const visibleEnd = idx + VISIBLE_AHEAD;
  const grid = $('obj-grid');
  grid.innerHTML = '';

  objs.forEach((o,i)=>{
    const done = completed.has(o.id);
    const active = i === idx && !done;
    const upcoming = !done && !active && i < visibleEnd;
    if(!done && !active && !upcoming) return;

    const p = done ? o.target : (active ? Math.min(getProgress(o,activeDiff),o.target) : 0);
    const pPct = Math.round(p/o.target*100);
    const progSub = active && !done ? (o.cum ? '<br><span style="font-size:8px;opacity:.45">totale accumulato</span>' : '<br><span style="font-size:8px;opacity:.45">miglior partita</span>') : '';
    const row = document.createElement('div');
    row.className = 'obj-row'+(active?' obj-active':done?' obj-done':' obj-upcoming');
    row.innerHTML = `
      <div class="or-icon">${o.icon}</div>
      <div class="or-info">
        <div class="or-name">${o.name}</div>
        <div class="or-desc">${o.desc}</div>
        <div class="or-bar-wrap"><div class="or-bar${done?' done':''}" style="width:${pPct}%"></div></div>
      </div>
      <div class="or-right">
        <div class="or-status">${done?'✅':active?'🔓':'🔒'}</div>
        <div class="or-reward">+${o.reward.toLocaleString()}</div>
        <div class="or-prog" style="text-align:right">${done||active ? p+'/'+o.target+progSub : ''}</div>
      </div>`;
    grid.appendChild(row);
  });

  const ahead = Math.min(VISIBLE_AHEAD-1, objs.length-1-idx);
  $('section-label').textContent = doneCount > 0
    ? `${doneCount} completat${doneCount===1?'o':'i'} · ${ahead} prossim${ahead===1?'a':'e'} visibili`
    : `${ahead} sfide visibili · completa per scoprire le altre`;

  const hiddenCount = objs.length - visibleEnd;
  const hc = $('hidden-card');
  if(hiddenCount > 0){
    hc.style.display = 'block';
    $('hc-count').textContent = '+'+hiddenCount+' nascost'+(hiddenCount===1?'a':'e');
  } else {
    hc.style.display = 'none';
  }
}

function getProgress(obj, d){
  try{
    const raw = localStorage.getItem('fb_stats_'+d);
    if(!raw) return 0;
    return JSON.parse(raw)[obj.type]||0;
  }catch(e){ return 0; }
}

document.querySelectorAll('.diff-tab').forEach(t=>{
  t.addEventListener('click',()=>{ activeDiff=t.dataset.diff; render(); });
});
$('back-btn').addEventListener('click',()=>{ location.href='index.html'; });
render();
</script>
</body>
